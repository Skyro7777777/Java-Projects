name: macOS RustDesk Debug (clean)

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: macos-latest

    env:
      GUI_USER: vncuser
      GUI_PASS: Apple@123
      DEBUG_DIR: /tmp/debug_screenshots
      PY_SCRIPT_URL: https://raw.githubusercontent.com/Skyro7777777/Java-Projects/refs/heads/main/grant__screen_recording.py
      DUMP_SCPT_URL: https://raw.githubusercontent.com/Skyro7777777/Java-Projects/refs/heads/main/dump_rustdesk_ui.scpt

    steps:
      - name: Prepare debug folder
        run: |
          mkdir -p "$DEBUG_DIR"
          chmod 777 "$DEBUG_DIR"

      - name: Create GUI user
        run: |
          if ! id -u "$GUI_USER" >/dev/null 2>&1; then
            sudo sysadminctl -addUser "$GUI_USER" -password "$GUI_PASS" || true
          fi
          sudo chown -R "$GUI_USER":staff "$DEBUG_DIR"

      - name: Install tools
        run: |
          brew install cliclick tesseract || true

      - name: Install RustDesk
        run: |
          curl -L -o /tmp/rustdesk.dmg https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.dmg
          hdiutil attach /tmp/rustdesk.dmg -mountpoint /Volumes/RustDesk || true
          cp -R "/Volumes/RustDesk/RustDesk.app" /Applications/
          hdiutil detach /Volumes/RustDesk || true

      - name: Launch RustDesk
        run: |
          sudo -u "$GUI_USER" open -a /Applications/RustDesk.app
          sleep 12
          sudo -u "$GUI_USER" screencapture -x "$DEBUG_DIR/01_launch.png" || true

      - name: Download Python script
        run: |
          curl -L "$PY_SCRIPT_URL" -o /tmp/grant.py
          chmod +x /tmp/grant.py
          sudo chown "$GUI_USER":staff /tmp/grant.py

      - name: Run Python automation
        continue-on-error: true
        run: |
          sudo -u "$GUI_USER" env PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin" \
            python3 /tmp/grant.py || true

          sleep 2
          sudo -u "$GUI_USER" screencapture -x "$DEBUG_DIR/02_after_python.png" || true

      - name: Download AppleScript (external only)
        run: |
          curl -L "$DUMP_SCPT_URL" -o /tmp/dump.scpt
          chmod +x /tmp/dump.scpt
          sudo chown "$GUI_USER":staff /tmp/dump.scpt

      - name: Run AppleScript dump
        continue-on-error: true
        run: |
          sudo -u "$GUI_USER" osascript /tmp/dump.scpt || true
          sleep 1
          sudo -u "$GUI_USER" screencapture -x "$DEBUG_DIR/03_after_dump.png" || true

      - name: Final capture
        run: |
          sudo -u "$GUI_USER" screencapture -x /tmp/rustdesk.png || true
          sudo -u "$GUI_USER" screencapture -x "$DEBUG_DIR/04_final.png" || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-screenshots
          path: |
            /tmp/debug_screenshots/**
            /tmp/rustdesk.png
            /tmp/rustdesk_ui.txt
          if-no-files-found: ignore