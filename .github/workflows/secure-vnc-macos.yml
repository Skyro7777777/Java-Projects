name: macOS GUI (RustDesk Full Automation)
on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    steps:
      - name: Install Tailscale (optional)
        run: |
          brew install tailscale
          sudo tailscaled --tun=userspace-networking &
          sleep 5
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-macos-rustdesk || true
          for i in {1..5}; do
            IP=$(sudo tailscale ip -4 2>/dev/null || echo "unknown")
            if [ "$IP" != "unknown" ]; then
              echo "TAILSCALE_IP=$IP" >> $GITHUB_ENV
              break
            fi
            sleep 5
          done

      - name: Create user vncuser with password Apple@123
        run: |
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/bash
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID "510"
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "Apple@123"
          sudo dscl . -append /Groups/admin GroupMembership vncuser
          sudo createhomedir -c -u vncuser
          echo "✅ Created user: vncuser (password: Apple@123)"

      - name: Install dependencies
        run: |
          brew install tesseract cliclick

      - name: Download and Install RustDesk
        run: |
          curl -L -o /tmp/rustdesk.dmg "https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.dmg"
          hdiutil attach /tmp/rustdesk.dmg -nobrowse -mountpoint /Volumes/RustDesk
          cp -R "/Volumes/RustDesk/RustDesk.app" /Applications/
          hdiutil detach "/Volumes/RustDesk"
          echo "✅ RustDesk installed"

      - name: Reset Screen Recording permissions
        run: |
          sudo tccutil reset ScreenCapture
          echo "✅ Permissions reset - RustDesk will now request access."

      - name: Launch RustDesk
        run: |
          sudo -u vncuser open /Applications/RustDesk.app
          sleep 5

      # ----- ENHANCED SCRIPT FETCH WITH CLEANING AND FALLBACK -----
      - name: Fetch, clean, and run Screen Recording grant script
        run: |
          set -x  # print commands for debugging
          SCRIPT_URL="https://raw.githubusercontent.com/Skyro7777777/Java-Projects/refs/heads/main/grant_screen_recording.applescript"
          RAW_PATH="/tmp/raw.applescript"
          CLEAN_PATH="/tmp/clean.applescript"

          # Download with HTTP status check
          echo "📥 Downloading from $SCRIPT_URL"
          HTTP_CODE=$(curl -s -L -w "%{http_code}" -o "$RAW_PATH" "$SCRIPT_URL")
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ Download failed with HTTP $HTTP_CODE"
            exit 1
          fi

          # Show raw file info
          echo "📄 Raw file size: $(wc -c < "$RAW_PATH") bytes, lines: $(wc -l < "$RAW_PATH")"
          echo "First 10 lines:"
          head -10 "$RAW_PATH"
          echo "Last 10 lines:"
          tail -10 "$RAW_PATH"

          # Clean the file: remove carriage returns, ensure UTF-8, and add final newline
          tr -d '\r' < "$RAW_PATH" > "$CLEAN_PATH"
          # Convert to UTF-8 (ignore errors)
          iconv -f utf-8 -t utf-8//ignore "$CLEAN_PATH" > "${CLEAN_PATH}.tmp" && mv "${CLEAN_PATH}.tmp" "$CLEAN_PATH"
          # Ensure file ends with newline
          echo >> "$CLEAN_PATH"

          echo "✅ Cleaned file size: $(wc -c < "$CLEAN_PATH") bytes, lines: $(wc -l < "$CLEAN_PATH")"

          # Validate that it contains "on run"
          if ! grep -q "on run" "$CLEAN_PATH"; then
            echo "❌ Cleaned script missing 'on run' – cannot proceed."
            exit 1
          fi

          # Attempt to run the cleaned script
          echo "🚀 Running cleaned script as vncuser..."
          if sudo -u vncuser osascript "$CLEAN_PATH" > /tmp/script_stdout.log 2> /tmp/script_stderr.log; then
            echo "✅ Cleaned script succeeded."
            cat /tmp/script_stdout.log
          else
            EXIT_CODE=$?
            echo "❌ Cleaned script failed with exit code $EXIT_CODE"
            echo "--- stdout ---"
            cat /tmp/script_stdout.log
            echo "--- stderr ---"
            cat /tmp/script_stderr.log
            echo "⚠️  Falling back to minimal inline AppleScript..."

            # Minimal fallback script (essential clicks only)
            sudo -u vncuser osascript <<'FALLBACK'
              -- Minimal fallback for Screen Recording permission
              property passwordStr : "Apple@123"
              delay 5
              tell application "System Events"
                -- Click Configure in RustDesk
                tell process "RustDesk"
                  set frontmost to true
                  delay 2
                  click (first button whose title is "Configure")
                end tell
                delay 3
                -- Click Open System Settings in dialog
                tell process "System Events"
                  click (first button of (first window whose title contains "Screen Recording") whose title is "Open System Settings")
                end tell
                delay 5
                -- Open Settings directly if needed
                do shell script "open 'x-apple.systempreferences:com.apple.preference.security?Privacy_ScreenRecording'"
                delay 5
                -- Enable RustDesk switch
                tell process "System Settings"
                  set frontmost to true
                  delay 3
                  -- Unlock if locked
                  try
                    click (first button whose description contains "lock")
                    delay 2
                    keystroke passwordStr
                    delay 1
                    keystroke return
                    delay 3
                  end try
                  -- Click switch for RustDesk
                  click checkbox 1 of (first row of table 1 of scroll area 1 of window 1 whose value of static text 1 is "RustDesk")
                end tell
                delay 3
                -- Handle any password dialog
                if exists (process "SecurityAgent") then
                  tell process "SecurityAgent"
                    keystroke passwordStr
                    delay 1
                    click (first button whose title is "Modify Settings")
                  end tell
                end if
                delay 3
                -- Quit RustDesk when prompted
                tell process "RustDesk"
                  click (first button whose title contains "Quit")
                end tell
                delay 5
                -- Wait for restart
                delay 10
              end tell
              do shell script "sudo -u vncuser screencapture -x /tmp/rustdesk_screen_final.png"
FALLBACK
            echo "✅ Fallback script executed."
          fi

      - name: Extract ID and password from screenshot
        run: |
          cd /tmp
          if [ -f rustdesk_screen_final.png ]; then
            tesseract rustdesk_screen_final.png stdout -l eng 2>/dev/null > rustdesk_text.txt
          else
            tesseract rustdesk_screen.png stdout -l eng 2>/dev/null > rustdesk_text.txt
          fi

          echo "=== RUSTDESK CREDENTIALS ==="
          RUSTDESK_ID=$(grep -Eo '[0-9]{9}' rustdesk_text.txt | head -1)
          RUSTDESK_PASS=$(grep -Eo '[A-Za-z0-9]{6,8}' rustdesk_text.txt | tail -1)

          if [ -n "$RUSTDESK_ID" ]; then
            echo "✅ RustDesk ID: $RUSTDESK_ID"
          else
            echo "❌ Could not extract ID. Full OCR text:"
            cat rustdesk_text.txt
          fi

          if [ -n "$RUSTDESK_PASS" ]; then
            echo "✅ Password: $RUSTDESK_PASS"
          else
            echo "❌ Could not extract password. Full OCR text:"
            cat rustdesk_text.txt
          fi

          echo "RUSTDESK_ID=$RUSTDESK_ID" >> $GITHUB_ENV
          echo "RUSTDESK_PASS=$RUSTDESK_PASS" >> $GITHUB_ENV

      - name: Upload screenshot for manual verification
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-screenshot
          path: |
            /tmp/rustdesk_screen_final.png
            /tmp/rustdesk_screen.png
          if-no-files-found: ignore

      - name: Keep alive and show connection info
        run: |
          echo "========================================================="
          echo "✅ RUSTDESK READY"
          echo "========================================================="
          echo "RustDesk ID: ${{ env.RUSTDESK_ID }}"
          echo "Password:    ${{ env.RUSTDESK_PASS }}"
          echo ""
          echo "📱 ANDROID CONNECTION:"
          echo "   1. Install 'RustDesk' from Google Play Store"
          echo "   2. Enter the ID above"
          echo "   3. When prompted, enter the password"
          echo "   4. You will see the macOS desktop!"
          echo ""
          echo "🌐 Tailscale IP (if needed): ${{ env.TAILSCALE_IP }}"
          echo ""
          echo "⏳ Job will stay alive for 6 hours. If OCR failed, download the screenshot artifact."
          echo "========================================================="
          while true; do sleep 3600; done