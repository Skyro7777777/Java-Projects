name: AnyDesk macOS — clear popups, add permissions, start service, set password

on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    env:
      GUI_USER: vncuser
      GUI_PASS: Apple@123
      DEBUG_DIR: /tmp/debug_screenshots
      ANYDESK_DMG_URL: "https://download.anydesk.com/anydesk.dmg"
      SCRIPT_URL: "https://raw.githubusercontent.com/Skyro7777777/Java-Projects/refs/heads/main/grant__screen_recording.py"
      UNATTENDED_PASSWORD: "Apple@123"

    steps:
      - name: Prepare debug folder
        run: |
          mkdir -p "${DEBUG_DIR}"
          chmod 777 "${DEBUG_DIR}"

      - name: Create GUI user (vncuser) and chown debug dir
        run: |
          if ! id -u "${GUI_USER}" >/dev/null 2>&1; then
            sudo dscl . -create /Users/${GUI_USER}
            sudo dscl . -create /Users/${GUI_USER} UserShell /bin/bash
            sudo dscl . -create /Users/${GUI_USER} RealName "VNC User"
            sudo dscl . -create /Users/${GUI_USER} UniqueID "510"
            sudo dscl . -create /Users/${GUI_USER} PrimaryGroupID 20
            sudo dscl . -create /Users/${GUI_USER} NFSHomeDirectory /Users/${GUI_USER}
            sudo dscl . -passwd /Users/${GUI_USER} "${GUI_PASS}"
            sudo dscl . -append /Groups/admin GroupMembership ${GUI_USER}
            sudo createhomedir -c -u ${GUI_USER} >/dev/null 2>&1 || true
          fi
          sudo chown -R ${GUI_USER}:staff "${DEBUG_DIR}"
          chmod -R 777 "${DEBUG_DIR}"

      - name: Install optional tools (tesseract, cliclick)
        run: |
          brew install tesseract cliclick || true
          which tesseract || true
          which cliclick || true

      - name: Download & Install AnyDesk (portable DMG)
        run: |
          set -euxo pipefail
          curl -L -o /tmp/anydesk.dmg "${ANYDESK_DMG_URL}"
          hdiutil attach /tmp/anydesk.dmg -mountpoint /Volumes/AnyDesk -nobrowse || true
          cp -R "/Volumes/AnyDesk/AnyDesk.app" /Applications/ || true
          hdiutil detach "/Volumes/AnyDesk" || true
          ls -l /Applications/AnyDesk.app || true

      - name: Aggressively clear any modal popups (click Open / Open System Settings / Allow)
        run: |
          cat > /tmp/clear_popups.applescript <<'AS'
  tell application "System Events"
    -- loop to aggressively click popup buttons that block flow
    repeat 18 times
      try
        repeat with p in (every process)
          try
            repeat with w in (every window of p)
              try
                -- common buttons on permission dialogs
                if exists button "Open System Settings" of w then click button "Open System Settings" of w
                if exists button "Open System Preferences" of w then click button "Open System Preferences" of w
                if exists button "Allow" of w then click button "Allow" of w
                if exists button "Open" of w then click button "Open" of w
                if exists button "OK" of w then click button "OK" of w
                if exists button "Enable" of w then click button "Enable" of w
              end try
            end repeat
          end try
        end repeat
      end try
      delay 0.6
    end repeat
  end tell
  AS
          sudo chown ${GUI_USER}:staff /tmp/clear_popups.applescript || true
          # run as gui user so sheets/windows are owned and visible to that user
          sudo -u ${GUI_USER} /usr/bin/osascript /tmp/clear_popups.applescript || true
          # save screenshot for diagnosis after clears
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/00_after_clear_popups.png" || true

      - name: Launch AnyDesk GUI (so app triggers its permission dialog)
        run: |
          sudo -u ${GUI_USER} open -a "/Applications/AnyDesk.app" || true
          sleep 6
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/01_after_launch.png" || true

      - name: If popup reappears, click Open System Settings (repeat)
        run: |
          # second attempt to clear any popup that appeared after launching app
          sudo -u ${GUI_USER} /usr/bin/osascript /tmp/clear_popups.applescript || true
          sleep 1
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/02_after_second_clear.png" || true

      - name: Discover AnyDesk bundle id & binary, dump Info.plist
        run: |
          APP="/Applications/AnyDesk.app"
          INFO="${APP}/Contents/Info.plist"
          echo "INFO: ${INFO}"
          if [ -f "${INFO}" ]; then
            /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "${INFO}" 2>/dev/null || true
            plutil -p "${INFO}" | sed -n '1,150p' || true
          else
            echo "Info.plist not found"
            ls -R "${APP}" || true
          fi
          # save discovered values for next step
          BUNDLE=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "${INFO}" 2>/dev/null || true)
          if [ -n "${BUNDLE}" ]; then echo "BUNDLE_ID=${BUNDLE}" > /tmp/anydesk_discover.env; fi
          BIN_CAND=$(ls -1 "${APP}/Contents/MacOS" 2>/dev/null | head -n1 || true)
          if [ -n "${BIN_CAND}" ]; then echo "BINARY=${APP}/Contents/MacOS/${BIN_CAND}" >> /tmp/anydesk_discover.env; fi
          echo "Saved /tmp/anydesk_discover.env:"
          cat /tmp/anydesk_discover.env || true
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/03_info_plist.png" || true

      - name: Reset TCC for discovered bundle id (if found) and dump TCC DB
        run: |
          if [ -f /tmp/anydesk_discover.env ]; then . /tmp/anydesk_discover.env; fi
          if [ -n "${BUNDLE_ID}" ]; then
            echo "Reset tcc for ${BUNDLE_ID}"
            sudo -u ${GUI_USER} tccutil reset ScreenCapture "${BUNDLE_ID}" || true
            sudo -u ${GUI_USER} tccutil reset Accessibility "${BUNDLE_ID}" || true
            sudo -u ${GUI_USER} tccutil reset ScreenRecording "${BUNDLE_ID}" || true
          else
            echo "No bundle id found; skipping tcc reset"
          fi
          # best-effort dump of TCC DB (may require permission)
          if [ -f "${HOME}/Library/Application Support/com.apple.TCC/TCC.db" ]; then
            sqlite3 "${HOME}/Library/Application Support/com.apple.TCC/TCC.db" "select * from access;" > /tmp/tcc_access_dump.txt || true
            cp -f /tmp/tcc_access_dump.txt "${DEBUG_DIR}/tcc_access_dump.txt" || true
          fi

      - name: Run permission-granting script (UI fallback) as GUI user
        run: |
          # Fetch user-supplied script that tries to open System Settings and add app
          if [ -n "${SCRIPT_URL}" ]; then
            curl -fsSL "${SCRIPT_URL}" -o /tmp/grant_screen_recording.py || true
            sudo chown ${GUI_USER}:staff /tmp/grant_screen_recording.py || true
            sudo chmod +x /tmp/grant_screen_recording.py || true
            sudo -u ${GUI_USER} env PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin" python3 /tmp/grant_screen_recording.py || true
          fi
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/04_after_grant_script.png" || true

      - name: Start AnyDesk service + set unattended password (robust)
        run: |
          set -euxo pipefail
          # source discovery
          if [ -f /tmp/anydesk_discover.env ]; then . /tmp/anydesk_discover.env; fi
          APP="/Applications/AnyDesk.app"
          # resolve binary
          if [ -n "${BINARY}" ] && [ -x "${BINARY}" ]; then
            AD_BIN="${BINARY}"
          else
            AD_BIN=$(find "${APP}/Contents/MacOS" -type f -perm +111 2>/dev/null | head -n1 || true)
          fi
          echo "AnyDesk binary: ${AD_BIN}"
          if [ -z "${AD_BIN}" ] || [ ! -x "${AD_BIN}" ]; then
            echo "ERROR: anydesk binary not found"
            ls -l "${APP}/Contents/MacOS" || true
            exit 1
          fi

          SERVICE_LOG="/tmp/anydesk_service.log"
          pkill -f AnyDesk || true
          sleep 1

          echo "Starting AnyDesk service..."
          sudo env PATH="/usr/bin:/bin:/usr/sbin:/sbin:/usr/local/bin:/opt/homebrew/bin" "${AD_BIN}" --service > "${SERVICE_LOG}" 2>&1 &

          # poll for CLI responsiveness
          READY=0
          for i in $(seq 1 30); do
            sleep 1
            if sudo "${AD_BIN}" --get-id >/tmp/anydesk_id.out 2>/tmp/anydesk_err.out; then
              READY=1
              echo "AnyDesk CLI ready after ${i}s"
              break
            fi
          done

          if [ "${READY}" -ne 1 ]; then
            echo "Service not ready; save diagnostics"
            ps auxww | egrep "AnyDesk|anydesk" || true
            tail -n 200 "${SERVICE_LOG}" || true
            cat /tmp/anydesk_err.out || true
          fi

          # set password (retries)
          SET_OK=0
          for j in $(seq 1 6); do
            echo "set-password attempt ${j}"
            if echo "${UNATTENDED_PASSWORD}" | sudo "${AD_BIN}" --set-password >/tmp/anydesk_setpw_out 2>/tmp/anydesk_setpw_err; then
              SET_OK=1
              echo "set-password ok"
              break
            fi
            sleep 2
          done

          cp -f "${SERVICE_LOG}" "${DEBUG_DIR}/anydesk_service.log" || true
          cp -f /tmp/anydesk_id.out "${DEBUG_DIR}/anydesk_id.out" || true
          cp -f /tmp/anydesk_err.out "${DEBUG_DIR}/anydesk_err.out" || true
          cp -f /tmp/anydesk_setpw_err "${DEBUG_DIR}/anydesk_setpw_err" || true
          cp -f /tmp/anydesk_setpw_out "${DEBUG_DIR}/anydesk_setpw_out" || true
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/05_after_service_and_setpw.png" || true

      - name: Final screenshots & upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anydesk-debug-artifacts
          path: |
            /tmp/debug_screenshots/**
            /tmp/anydesk_final.png
            /tmp/anydesk_service.log
            /tmp/anydesk_id.out
            /tmp/anydesk_err.out
            /tmp/anydesk_setpw_err
            /tmp/anydesk_setpw_out
            /tmp/anydesk_discover.env
            /tmp/tcc_access_dump.txt
          if-no-files-found: ignore

      - name: Keep runner alive (10 minutes)
        run: |
          echo "Runner sleeping 10 minutes so you can fetch artifacts."
          sleep 600