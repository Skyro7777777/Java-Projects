name: Secure VNC (macOS Tailscale Remote Desktop) - Runner Session

on:
  workflow_dispatch:

jobs:
  secure-vnc:
    runs-on: macos-latest
    timeout-minutes: 420

    steps:
      - name: Set Password for Runner User
        run: |
          # Set password for runner user using dscl (most reliable method)
          sudo dscl . -passwd /Users/runner "Apple@123"
          
          # Verify the password works
          if su - runner -c "echo 'Password set successfully'" 2>/dev/null; then
              echo "✅ Password verified for runner user"
          else
              echo "⚠️ Password verification failed, trying alternative method..."
              # Alternative method
              echo 'Apple@123' | sudo passwd runner --stdin 2>/dev/null || true
          fi
          
          echo "VNC_USER=runner" >> $GITHUB_ENV
          echo "VNC_PASSWORD=Apple@123" >> $GITHUB_ENV
          
          echo "✅ Runner user password set to: Apple@123"

      - name: Enable Screen Sharing for Runner
        run: |
          # Stop existing Remote Management
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -deactivate -stop 2>/dev/null || true
          
          sleep 2
          
          # Configure for runner user with VNC password
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure \
            -access -on \
            -users runner \
            -privs -all \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "Apple@123" \
            -restart -agent
          
          echo "✅ VNC configured for runner user"

      - name: Reset Screen Permissions
        run: |
          sudo tccutil reset ScreenCapture 2>/dev/null || true
          sudo tccutil reset Accessibility 2>/dev/null || true
          echo "✅ Permissions reset"

      - name: Launch Desktop Apps
        run: |
          RUNNER_UID=$(id -u runner)
          
          # Open Finder (shows desktop)
          sudo launchctl asuser $RUNNER_UID open -a Finder
          sleep 2
          
          # Open Terminal (gives you something to see)
          sudo launchctl asuser $RUNNER_UID open -a Terminal
          sleep 2
          
          # Prevent sleep
          sudo pmset -a displaysleep 0
          sudo pmset -a sleep 0
          sudo caffeinate -d -i -m -u &
          
          echo "✅ Desktop apps launched"

      - name: Wait for Initialization
        run: |
          sleep 10
          echo "=== GUI Processes ==="
          ps aux | grep -E "(Finder|Terminal|Dock)" | grep -v grep || true

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          tags: tag:gh-runner-macos
          statedir: /tmp/tailscale-state

      - name: Get Tailscale IP
        run: |
          tailscale set --hostname=gh-runner-macos-$GITHUB_RUN_ID
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
          echo "✅ Tailscale IP: $TS_IP"

      - name: Test VNC Port
        run: |
          if nc -z -w 5 "${{ env.TAILSCALE_IP }}" 5900; then
              echo "✅ VNC port 5900 is accessible"
          else
              echo "❌ VNC port 5900 not accessible"
              exit 1
          fi

      - name: Maintain Connection
        run: |
          RUNNER_UID=$(id -u runner)
          
          echo ""
          echo "=========================================="
          echo "           VNC CONNECTION INFO"
          echo "=========================================="
          echo "  Address:  vnc://${{ env.TAILSCALE_IP }}:5900"
          echo "  Username: runner"
          echo "  Password: Apple@123"
          echo "=========================================="
          echo ""
          echo "NOTE: If password doesn't work, try connecting"
          echo "without username - just use the VNC password: Apple@123"
          echo ""
          
          while true; do
              if ! pgrep -u runner Terminal > /dev/null; then
                  sudo launchctl asuser $RUNNER_UID open -a Terminal 2>/dev/null || true
              fi
              echo "[$(date)] VNC Active"
              sleep 300
          done
