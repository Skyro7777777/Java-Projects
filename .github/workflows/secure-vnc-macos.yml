name: macOS GUI (DeepLink Automated)
on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    steps:
      - name: Install Tailscale (optional)
        run: |
          brew install tailscale
          sudo tailscaled --tun=userspace-networking &
          sleep 5
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-macos-deeplink || true
          for i in {1..5}; do
            IP=$(sudo tailscale ip -4 2>/dev/null || echo "unknown")
            if [ "$IP" != "unknown" ]; then
              echo "TAILSCALE_IP=$IP" >> $GITHUB_ENV
              break
            fi
            sleep 5
          done

      - name: Create user vncuser with password Apple@123
        run: |
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/bash
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID "510"
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "Apple@123"
          sudo dscl . -append /Groups/admin GroupMembership vncuser
          sudo createhomedir -c -u vncuser
          echo "✅ Created user: vncuser (password: Apple@123)"

      - name: Install dependencies (cliclick, tesseract, imagemagick)
        run: |
          brew install cliclick tesseract imagemagick

      - name: Download DeepLink .dmg
        run: |
          curl -L -o /tmp/deeplink.dmg "https://pub-1b47391b45ed418d8a02bf732d2f944a.r2.dev/deeplink_arm64.dmg"
          echo "✅ Download complete"

      - name: Install DeepLink
        run: |
          hdiutil attach /tmp/deeplink.dmg -nobrowse -mountpoint /Volumes/DeepLink
          cp -R "/Volumes/DeepLink/DeepLink.app" /Applications/
          hdiutil detach "/Volumes/DeepLink"
          echo "✅ DeepLink installed to /Applications"

      - name: Launch DeepLink and wait for full load
        run: |
          sudo -u vncuser open /Applications/DeepLink.app
          echo "Waiting 60 seconds for DeepLink to fully initialize..."
          sleep 60

      - name: Navigate to Remote Control tab and reveal password
        run: |
          # Use AppleScript to click the "Remote Control" tab and then the eye button
          sudo -u vncuser osascript <<'APPLESCRIPT' || true
            tell application "System Events"
              tell process "DeepLink"
                set frontmost to true
                delay 2
                -- Click on the "Remote Control" tab (assuming it's a button or radio button)
                try
                  click (first button of window 1 whose name contains "Remote Control")
                on error
                  -- Fallback: try clicking by position (if name not found)
                  click at {200, 100} -- approximate coordinates; adjust if needed
                end try
                delay 3
                -- Now click the eye button to reveal password
                -- The eye button is likely a button with no text, so we click by position
                -- Assuming the eye is near the password field (e.g., right side)
                -- Let's try a few candidate positions
                try
                  -- First attempt: look for a button with description "eye"
                  click (first button of window 1 whose description contains "eye")
                on error
                  -- Fallback: click at a relative position (adjust based on screenshot)
                  click at {400, 300}
                end try
              end tell
            end tell
          APPLESCRIPT
          echo "✅ Attempted to click Remote Control tab and eye button"
          sleep 5

      - name: Capture screenshot and extract credentials
        run: |
          # Take a screenshot of the whole screen
          sudo -u vncuser screencapture -x /tmp/deeplink_screen.png

          # Use OCR to extract Device ID and password
          cd /tmp
          # Enhance image for better OCR
          convert deeplink_screen.png -colorspace Gray -contrast -sharpen 0x1 enhanced.png
          tesseract enhanced.png stdout -l eng 2>/dev/null > deeplink_text.txt

          echo "=== DEEPLINK CREDENTIALS ==="
          # Look for a 9-digit number (Device ID)
          DEVICE_ID=$(grep -Eo '[0-9]{9}' deeplink_text.txt | head -1)
          # Look for a password: likely 6+ alphanumeric characters (might be mixed case)
          PASSWORD=$(grep -Eo '[A-Za-z0-9]{6,}' deeplink_text.txt | tail -1)

          if [ -n "$DEVICE_ID" ]; then
            echo "✅ Device ID: $DEVICE_ID"
          else
            echo "❌ Could not extract Device ID. See full OCR text below:"
            cat deeplink_text.txt
          fi

          if [ -n "$PASSWORD" ]; then
            echo "✅ Password: $PASSWORD"
          else
            echo "❌ Could not extract password. Full OCR text:"
            cat deeplink_text.txt
          fi

          # Save to environment
          echo "DEEPLINK_ID=$DEVICE_ID" >> $GITHUB_ENV
          echo "DEEPLINK_PASS=$PASSWORD" >> $GITHUB_ENV

      - name: Upload screenshot for manual verification
        uses: actions/upload-artifact@v4
        with:
          name: deeplink-screenshot
          path: /tmp/deeplink_screen.png
          if-no-files-found: ignore

      - name: Display connection info and keep alive
        run: |
          echo "========================================================="
          echo "✅ DEEPLINK READY"
          echo "========================================================="
          echo "DeepLink Device ID: ${{ env.DEEPLINK_ID }}"
          echo "DeepLink Password:  ${{ env.DEEPLINK_PASS }}"
          echo ""
          echo "📱 ANDROID CONNECTION:"
          echo "   1. Install 'DeepLink' from Google Play Store"
          echo "   2. Open the app and tap 'Remote Control'"
          echo "   3. Enter the Device ID and Password above"
          echo "   4. You will see the macOS desktop instantly!"
          echo ""
          echo "🌐 Tailscale IP (if needed): ${{ env.TAILSCALE_IP }}"
          echo ""
          echo "⏳ Job will stay alive for 6 hours. If OCR failed, download the screenshot artifact."
          echo "========================================================="
          while true; do sleep 3600; done