name: Secure VNC (macOS Tailscale Remote Desktop) - Black Screen FIXED

on:
  workflow_dispatch:

jobs:
  secure-vnc:
    runs-on: macos-latest
    timeout-minutes: 420          # 25200 seconds = 7 hours

    steps:
      - name: Create VNC User with Fixed Password
        run: |
          password="Apple@123"
          
          sudo sysadminctl -addUser Skyro \
            -password "$password" \
            -fullName "Skyro" \
            -admin
          
          sudo dscl . -append /Groups/admin GroupMembership Skyro
          
          echo "VNC_USER=Skyro" >> $GITHUB_ENV
          echo "VNC_PASSWORD=$password" >> $GITHUB_ENV
          
          if ! id Skyro &>/dev/null; then
              echo "User creation failed"
              exit 1
          fi
          
          echo "✅ Skyro user created with password: Apple@123"

      - name: Reset TCC Permissions
        run: |
          sudo tccutil reset ScreenCapture || true
          sudo tccutil reset Accessibility || true
          echo "✅ TCC reset (black screen fix)"

      - name: Set Legacy VNC Password File (Eliminates warnings)
        run: |
          echo "Apple@123" | perl -we '
            BEGIN { @k = unpack "C*", pack "H*", "1734516E8BA8C5E2FF1C39567390ADCA" }
            $_ = <>; chomp; s/^(.{8}).*/$1/; @p = unpack "C*", $_;
            foreach (@k) { printf "%02X", $_ ^ (shift @p || 0) }; print "\n"
          ' | sudo tee /Library/Preferences/com.apple.VNCSettings.txt > /dev/null
          
          echo "✅ Legacy VNC password file created"

      - name: Configure Screen Sharing (VNC)
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure \
            -access -on \
            -users Skyro \
            -privs -all \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "${{ env.VNC_PASSWORD }}" \
            -restart -agent
          
          echo "✅ Screen Sharing (VNC on port 5900) enabled"

      - name: Connect Tailscale (Official GitHub Action)
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          tags: tag:gh-runner-macos
          statedir: /tmp/tailscale-state

      - name: Set Hostname + Get Tailscale IP
        run: |
          tailscale set --hostname=gh-runner-macos-$GITHUB_RUN_ID
          
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
          echo "✅ Tailscale IP: $TS_IP"

      - name: Verify VNC Accessibility
        run: |
          echo "Tailscale IP: ${{ env.TAILSCALE_IP }}"
          
          if ! nc -z -w 5 "${{ env.TAILSCALE_IP }}" 5900; then
              echo "TCP connection to VNC port 5900 failed"
              exit 1
          fi
          echo "✅ TCP connectivity successful!"

      - name: Maintain Connection
        run: |
          echo ""
          echo "=== VNC ACCESS ==="
          echo "Address: vnc://${{ env.TAILSCALE_IP }}:5900"
          echo "Username: Skyro"
          echo "Password: Apple@123"
          echo "=================="
          echo ""
          echo "✅ FULL Skyro desktop is ready (no black screen)"
          echo "Connect with:"
          echo "• macOS Screen Sharing → enter Username + Password"
          echo "• RealVNC Viewer, bVNC, etc. → use Username + Password"
          
          while true; do
              echo "[$(date)] VNC Active - Use Ctrl+C to terminate"
              sleep 300
          done
