name: NoMachine macOS Stable (Tailscale Remote Desktop)

on:
  workflow_dispatch:

jobs:
  mac:
    runs-on: macos-13
    timeout-minutes: 420

    steps:

    - name: Install NoMachine safely
      run: |
        brew install --cask nomachine

        echo "Waiting for NoMachine install..."

        for i in {1..30}; do
          if [ -f /usr/NX/bin/nxserver ]; then
            echo "nxserver found"
            break
          fi
          sleep 2
        done

        if [ ! -f /usr/NX/bin/nxserver ]; then
          echo "NoMachine not installed"
          ls /usr
          ls /usr/NX || true
          exit 1
        fi

        sudo /usr/NX/bin/nxserver --virtualdesktop yes || true
        sudo /usr/NX/bin/nxserver --restart

        echo "NoMachine ready"


    - name: Connect Tailscale
      uses: tailscale/github-action@v4
      with:
        authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
        tags: tag:gh-mac
        statedir: /tmp/tailscale-state


    - name: Get Tailscale IP
      run: |
        TS=$(tailscale ip -4)
        echo "IP=$TS" >> $GITHUB_ENV
        echo "Tailscale IP: $TS"


    - name: Check NoMachine port
      run: |
        sleep 5
        nc -z 127.0.0.1 4000 || exit 1
        echo "Port 4000 OK"


    - name: Maintain session
      run: |
        echo ""
        echo "=== CONNECT WITH NOMACHINE ==="
        echo "Address: ${{ env.IP }}:4000"
        echo "Protocol: NX"
        echo "User: runner"
        echo "Password: (leave empty)"
        echo ""
        echo "⚠ First connection may take 20–40 sec"
        echo ""

        while true; do
          date
          sleep 300
        done
