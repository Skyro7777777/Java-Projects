name: Secure NoMachine (macOS Tailscale Remote Desktop) - Virtual Desktop Mode

on:
  workflow_dispatch:

jobs:
  secure-nomachine:
    runs-on: macos-latest
    timeout-minutes: 420

    steps:
      - name: Create Admin User with Fixed Password
        run: |
          password="Apple@123"
          
          sudo sysadminctl -addUser Skyro \
            -password "$password" \
            -fullName "Skyro" \
            -admin
          
          sudo dscl . -append /Groups/admin GroupMembership Skyro
          
          echo "NM_USER=Skyro" >> $GITHUB_ENV
          echo "NM_PASSWORD=$password" >> $GITHUB_ENV
          
          if ! id Skyro &>/dev/null; then
              echo "User creation failed"
              exit 1
          fi
          
          echo "✅ Skyro admin user created"

      - name: Skip loginwindow hack (use virtual desktop)
        run: |
          echo "Skipping AutoLogin — using NoMachine virtual display"

      - name: Install NoMachine Server + Virtual Desktop
        run: |
          brew install --cask nomachine

          sudo /usr/NX/bin/nxserver --virtualdesktop yes || true
          sudo /usr/NX/bin/nxserver --restart

          sleep 15

          echo "✅ NoMachine virtual desktop enabled"

      - name: Reset macOS Permissions
        run: |
          sudo tccutil reset All || true
          echo "✅ Screen Recording / Accessibility permissions reset"

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          tags: tag:gh-runner-macos
          statedir: /tmp/tailscale-state

      - name: Set Hostname + Get Tailscale IP
        run: |
          tailscale set --hostname=gh-runner-macos-$GITHUB_RUN_ID
          
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
          echo "✅ Tailscale IP: $TS_IP"

      - name: Verify NoMachine Accessibility
        run: |
          echo "Tailscale IP: ${{ env.TAILSCALE_IP }}"
          
          if ! nc -z -w 5 "${{ env.TAILSCALE_IP }}" 4000; then
              echo "TCP connection to NoMachine port 4000 failed"
              exit 1
          fi
          echo "✅ TCP connectivity successful!"

      - name: Maintain Connection
        run: |
          echo ""
          echo "=== NoMachine ACCESS ==="
          echo "Address: ${{ env.TAILSCALE_IP }}:4000"
          echo "Username: Skyro"
          echo "Password: Apple@123"
          echo "Protocol: NoMachine (NOT SSH)"
          echo "=================="
          echo ""
          echo "Download client: https://www.nomachine.com/download"
          echo ""
          echo "⚠️ Connect and wait 20-30s — virtual desktop mode active."
          
          while true; do
              echo "[$(date)] NoMachine Active - Ctrl+C to stop"
              sleep 300
          done
