name: macOS AnyDesk Robust Install + Unattended

on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    env:
      GUI_USER: vncuser
      GUI_PASS: Apple@123
      DEBUG_DIR: /tmp/debug_screenshots
      ANYDESK_DMG_URL: "https://download.anydesk.com/anydesk.dmg"
      SCRIPT_URL: "https://raw.githubusercontent.com/Skyro7777777/Java-Projects/refs/heads/main/grant__screen_recording.py"
      UNATTENDED_PASSWORD: "Apple@123"

    steps:
      - name: Prepare debug folder
        run: |
          mkdir -p "${DEBUG_DIR}"
          chmod 777 "${DEBUG_DIR}"

      - name: Create GUI user (vncuser)
        run: |
          if ! id -u "${GUI_USER}" >/dev/null 2>&1; then
            sudo dscl . -create /Users/${GUI_USER}
            sudo dscl . -create /Users/${GUI_USER} UserShell /bin/bash
            sudo dscl . -create /Users/${GUI_USER} RealName "VNC User"
            sudo dscl . -create /Users/${GUI_USER} UniqueID "510"
            sudo dscl . -create /Users/${GUI_USER} PrimaryGroupID 20
            sudo dscl . -create /Users/${GUI_USER} NFSHomeDirectory /Users/${GUI_USER}
            sudo dscl . -passwd /Users/${GUI_USER} "${GUI_PASS}"
            sudo dscl . -append /Groups/admin GroupMembership ${GUI_USER}
            sudo createhomedir -c -u ${GUI_USER} >/dev/null 2>&1 || true
          fi
          sudo chown -R ${GUI_USER}:staff "${DEBUG_DIR}"
          chmod -R 777 "${DEBUG_DIR}"

      - name: Install Homebrew tools (optional)
        run: |
          brew install tesseract cliclick || true

      - name: Download & Install AnyDesk (portable DMG)
        run: |
          set -euxo pipefail
          curl -L -o /tmp/anydesk.dmg "${ANYDESK_DMG_URL}"
          hdiutil attach /tmp/anydesk.dmg -mountpoint /Volumes/AnyDesk -nobrowse || true
          cp -R "/Volumes/AnyDesk/AnyDesk.app" /Applications/ || true
          hdiutil detach "/Volumes/AnyDesk" || true
          ls -l /Applications/AnyDesk.app || true

      - name: Discover bundle id & binary, capture Info.plist (diagnostics)
        run: |
          set -euxo pipefail
          APP="/Applications/AnyDesk.app"
          INFO_PLIST="${APP}/Contents/Info.plist"
          echo "INFO_PLIST: ${INFO_PLIST}"
          if [ -f "${INFO_PLIST}" ]; then
            echo "Dumping CFBundleIdentifier and Info:"
            /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "${INFO_PLIST}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Print" "${INFO_PLIST}" | sed -n '1,200p' || true
            # fallback: plutil readable print
            plutil -p "${INFO_PLIST}" | sed -n '1,200p' || true
          else
            echo "Info.plist not found at expected path."
            ls -R "${APP}" || true
          fi

          # discover any executable inside Contents/MacOS
          if [ -d "${APP}/Contents/MacOS" ]; then
            echo "Executables under Contents/MacOS:"
            ls -l "${APP}/Contents/MacOS" || true
          fi

          # write discovered values for the workflow to pick up
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "${INFO_PLIST}" 2>/dev/null || true)
          if [ -z "$BUNDLE_ID" ]; then
            # fallback attempt with defaults (sometimes works)
            BUNDLE_ID=$(defaults read "${APP}/Contents/Info" CFBundleIdentifier 2>/dev/null || true)
          fi
          echo "BUNDLE_ID=${BUNDLE_ID}" > /tmp/anydesk_discover.env
          # discover binary path
          BIN_CAND=$(ls -1 "${APP}/Contents/MacOS" 2>/dev/null | head -n1 || true)
          if [ -n "${BIN_CAND}" ]; then
            echo "BINARY=${APP}/Contents/MacOS/${BIN_CAND}" >> /tmp/anydesk_discover.env
          fi
          echo "Saved discovery to /tmp/anydesk_discover.env"
          cat /tmp/anydesk_discover.env

      - name: Reset TCC for discovered bundle id (if available)
        run: |
          set -euxo pipefail
          if [ -f /tmp/anydesk_discover.env ]; then
            . /tmp/anydesk_discover.env
          fi
          if [ -n "${BUNDLE_ID}" ]; then
            echo "Resetting tcc for bundle id: ${BUNDLE_ID}"
            sudo -u ${GUI_USER} tccutil reset ScreenCapture "${BUNDLE_ID}" || true
            sudo -u ${GUI_USER} tccutil reset Accessibility "${BUNDLE_ID}" || true
            sudo -u ${GUI_USER} tccutil reset ScreenRecording "${BUNDLE_ID}" || true
          else
            echo "No bundle id discovered; skipping tcc reset (will capture diagnostics)."
          fi
          # dump current tcc db permissions (best-effort) for diagnostics
          sqlite3 ~/Library/Application\ Support/com.apple.TCC/TCC.db "SELECT * FROM access" >/tmp/tcc_access_dump.txt 2>/dev/null || true
          cp -f /tmp/tcc_access_dump.txt "${DEBUG_DIR}/tcc_access_dump.txt" || true

      - name: Launch AnyDesk GUI as vncuser (so UI prompts appear)
        run: |
          sudo -u ${GUI_USER} open -a "/Applications/AnyDesk.app" || true
          sleep 8
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/01_after_launch.png" || true

      - name: Try best-effort UI automation to add app to permissions (open settings + press +)
        run: |
          # attempt to call your existing script to add permission entries (best-effort)
          curl -fsSL "${SCRIPT_URL}" -o /tmp/grant_screen_recording.py || true
          sudo chown ${GUI_USER}:staff /tmp/grant_screen_recording.py || true
          sudo chmod +x /tmp/grant_screen_recording.py || true
          sudo -u ${GUI_USER} env PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin" python3 /tmp/grant_screen_recording.py || true
          sleep 6
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/02_after_grant_script.png" || true

      - name: Start AnyDesk service using discovered binary & robust set-password
        run: |
          set -euxo pipefail
          # source the discovery file
          if [ -f /tmp/anydesk_discover.env ]; then
            . /tmp/anydesk_discover.env
          fi
          APP="/Applications/AnyDesk.app"
          SERVICE_LOG="/tmp/anydesk_service.log"
          # pick binary
          if [ -n "${BINARY}" ] && [ -x "${BINARY}" ]; then
            AD_BIN="${BINARY}"
          else
            # fallback: find any executable in Contents/MacOS
            AD_BIN=$(find "${APP}/Contents/MacOS" -type f -perm +111 2>/dev/null | head -n1 || true)
          fi
          echo "Resolved AnyDesk binary: ${AD_BIN}"
          if [ -z "${AD_BIN}" ] || [ ! -x "${AD_BIN}" ]; then
            echo "ERROR: AnyDesk executable not found or not executable."
            ls -l "${APP}/Contents/MacOS" || true
            exit 1
          fi

          # stop old processes
          pkill -f AnyDesk || true
          sleep 2

          echo "Starting AnyDesk service (background) with ${AD_BIN}"
          sudo env PATH="/usr/bin:/bin:/usr/sbin:/sbin:/usr/local/bin:/opt/homebrew/bin" "${AD_BIN}" --service > "${SERVICE_LOG}" 2>&1 &

          # wait for CLI to respond
          READY=0
          for i in $(seq 1 30); do
            sleep 1
            if sudo "${AD_BIN}" --get-id >/tmp/anydesk_id.out 2>/tmp/anydesk_err.out; then
              echo "AnyDesk CLI responsive (after ${i}s)"
              READY=1
              break
            fi
          done

          if [ "${READY}" -ne 1 ]; then
            echo "Service not responsive; saving diagnostics:"
            ps auxww | egrep "AnyDesk|anydesk" || true
            tail -n 200 "${SERVICE_LOG}" || true
            cat /tmp/anydesk_err.out || true
            # continue to attempt set-password once
          fi

          # set unattended password (retries)
          SET_OK=0
          for j in $(seq 1 6); do
            echo "Attempt ${j} to set password"
            if echo "${UNATTENDED_PASSWORD}" | sudo "${AD_BIN}" --set-password >/tmp/anydesk_setpw_out 2>/tmp/anydesk_setpw_err; then
              SET_OK=1
              echo "Set password succeeded on attempt ${j}"
              break
            fi
            sleep 2
          done

          # copy logs to debug
          cp -f "${SERVICE_LOG}" "${DEBUG_DIR}/anydesk_service.log" || true
          cp -f /tmp/anydesk_id.out "${DEBUG_DIR}/anydesk_id.out" || true
          cp -f /tmp/anydesk_err.out "${DEBUG_DIR}/anydesk_err.out" || true
          cp -f /tmp/anydesk_setpw_err "${DEBUG_DIR}/anydesk_setpw_err" || true
          cp -f /tmp/anydesk_setpw_out "${DEBUG_DIR}/anydesk_setpw_out" || true
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/03_after_service_attempt.png" || true

      - name: Final screenshots & artifacts
        run: |
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x /tmp/anydesk_final.png || true
          sudo chown ${GUI_USER}:staff /tmp/anydesk_final.png || true
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/04_final_anydesk.png" || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-screenshots-and-logs
          path: |
            /tmp/debug_screenshots/**
            /tmp/anydesk_final.png
            /tmp/anydesk_service.log
            /tmp/anydesk_id.out
            /tmp/anydesk_err.out
            /tmp/anydesk_setpw_err
            /tmp/anydesk_setpw_out
            /tmp/anydesk_discover.env
            /tmp/tcc_access_dump.txt
          if-no-files-found: ignore

      - name: Keep runner alive (short)
        run: |
          echo "Done; runner sleeps 10 minutes so you can download artifacts"
          sleep 600