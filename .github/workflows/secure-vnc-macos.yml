name: macOS GUI (Tailscale + NoMachine - Fixed)
on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    steps:
      - name: Install Tailscale
        run: |
          brew install tailscale
          sudo tailscaled --tun=userspace-networking &
          sleep 5
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-macos
          for i in {1..10}; do
            IP=$(sudo tailscale ip -4 2>/dev/null || true)
            if [ -n "$IP" ]; then
              echo "TAILSCALE_IP=$IP" >> $GITHUB_ENV
              break
            fi
            sleep 5
          done

      - name: Create user with known password
        run: |
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/bash
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID "510"
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "Apple@123"
          sudo dscl . -append /Groups/admin GroupMembership vncuser
          sudo createhomedir -c -u vncuser

      - name: Force graphical environment to start
        run: |
          # Switch to the new user and launch the Dock (which brings up the whole GUI)
          sudo -u vncuser launchctl bootstrap gui/$(id -u vncuser) /System/Library/LaunchAgents/com.apple.Dock.plist 2>/dev/null || true
          # Also launch Finder to ensure UI components load
          sudo -u vncuser open -a Finder 2>/dev/null || true
          sleep 10

      - name: Install and start NoMachine correctly
        run: |
          brew install --cask nomachine
          # Start NoMachine server with correct binary
          sudo /Applications/NoMachine.app/Contents/MacOS/NoMachine &
          sleep 15
          # Ensure it's listening
          if sudo lsof -i :4000 > /dev/null; then
            echo "✅ NoMachine is listening on port 4000"
          else
            echo "⚠️ NoMachine port not open - trying alternative start method"
            # Alternative: launch via launchctl
            sudo launchctl load /Library/LaunchDaemons/com.nomachine.nxserver.plist
            sleep 10
          fi

      - name: Display connection info and keep alive
        run: |
          echo "=========================================="
          echo "✅ NoMachine server should be running on port 4000"
          echo "🌐 Connect using NoMachine client to ${{ env.TAILSCALE_IP }}:4000"
          echo "=========================================="
          echo "LOGIN CREDENTIALS:"
          echo "   Username: vncuser"
          echo "   Password: Apple@123"
          echo "=========================================="
          echo "⏳ Job will stay alive for 6 hours"
          echo "If you still see a black screen, try these debugging steps inside the runner:"
          echo "   sudo launchctl list | grep -i nomachine"
          echo "   sudo cat /Library/Application\\ Support/NoMachine/var/log/nxserver.log"
          while true; do sleep 3600; done
