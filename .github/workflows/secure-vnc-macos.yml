name: macOS GUI TeamViewer Automation

on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest

    steps:
    # -----------------------------
    # Create debug dir
    # -----------------------------
    - name: Prepare debug folder
      run: mkdir -p /tmp/debug_screenshots

    # -----------------------------
    # Create GUI user
    # -----------------------------
    - name: Create user
      run: |
        sudo dscl . -create /Users/vncuser
        sudo dscl . -create /Users/vncuser UserShell /bin/bash
        sudo dscl . -create /Users/vncuser RealName "VNC User"
        sudo dscl . -create /Users/vncuser UniqueID 510
        sudo dscl . -create /Users/vncuser PrimaryGroupID 20
        sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
        sudo dscl . -passwd /Users/vncuser Apple@123
        sudo dscl . -append /Groups/admin GroupMembership vncuser
        sudo createhomedir -c -u vncuser

    # -----------------------------
    # Install dependencies
    # -----------------------------
    - name: Install deps
      run: |
        brew install tesseract cliclick

    # -----------------------------
    # Install TeamViewer (Robust Version)
    # -----------------------------
    - name: Install TeamViewer
      run: |
        curl -L -o /tmp/TeamViewer.dmg "https://dl.teamviewer.com/download/version_15x/TeamViewer.dmg"
        
        # Attach DMG
        hdiutil attach /tmp/TeamViewer.dmg -mountpoint /Volumes/TeamViewer -nobrowse
        
        # Debug: List what is inside
        echo "Contents of DMG:"
        ls -la /Volumes/TeamViewer/
        
        # Robust Copy: Find the .app recursively and copy it
        # This handles cases where the app is inside a subfolder
        APP_SRC=$(find /Volumes/TeamViewer -name "*.app" -type d | head -n 1)
        
        if [ -n "$APP_SRC" ]; then
          echo "Found App: $APP_SRC"
          cp -R "$APP_SRC" /Applications/
        else
          echo "ERROR: Could not find .app in DMG"
          exit 1
        fi
        
        # Detach
        hdiutil detach /Volumes/TeamViewer || true

    # -----------------------------
    # Write Visual Automation Script
    # -----------------------------
    - name: Write automation script
      run: |
        cat << 'PY' > /tmp/automate_tv.py
        import subprocess
        import time
        import re
        import os
        import sys

        DEBUG_DIR = "/tmp/debug_screenshots"
        USER_PASS = "Apple@123"

        def run(cmd):
            print(f"[CMD] {cmd}")
            res = subprocess.run(cmd, shell=True, capture_output=True, text=True)
            if res.stderr: print(f"[ERR] {res.stderr}")
            return res.stdout

        def shot(name):
            path = f"{DEBUG_DIR}/{name}"
            subprocess.run(f"screencapture -x {path}", shell=True)
            return path

        def ocr_find_click(img_path, target_text, offset_x=0, offset_y=0, check_only=False):
            """
            Performs OCR, finds text, clicks center of it.
            """
            cmd = f"tesseract {img_path} stdout tsv"
            res = subprocess.run(cmd, shell=True, capture_output=True, text=True)
            
            lines = res.stdout.strip().split('\n')
            if len(lines) < 2: return False

            keys = lines[0].split('\t')
            
            for line in lines[1:]:
                vals = line.split('\t')
                if len(vals) != len(keys): continue
                
                entry = dict(zip(keys, vals))
                text = entry.get('text', '').strip()
                
                if target_text.lower() in text.lower():
                    left = int(entry['left'])
                    top = int(entry['top'])
                    width = int(entry['width'])
                    height = int(entry['height'])
                    
                    cx = left + width // 2
                    cy = top + height // 2
                    
                    final_x = cx + offset_x
                    final_y = cy + offset_y
                    
                    print(f"[OCR] Found '{text}' at ({left},{top}). Clicking ({final_x},{final_y})")
                    
                    if not check_only:
                        subprocess.run(f"cliclick c:{final_x},{final_y}", shell=True)
                        time.sleep(1)
                    return True
            return False

        def wait_and_click(target_text, timeout=15, offset_x=0, offset_y=0):
            print(f"[WAIT] Looking for '{target_text}'...")
            start = time.time()
            while time.time() - start < timeout:
                img = shot(f"wait_{target_text.replace(' ','_')}.png")
                if ocr_find_click(img, target_text, offset_x, offset_y):
                    return True
                time.sleep(1)
            print(f"[FAIL] Timeout waiting for '{target_text}'")
            return False

        def handle_permission_workflow(permission_name):
            """
            Flow: Click 'Request Access' -> Click 'Open System Settings' -> Toggle -> Handle Password
            """
            print(f"--- Handling {permission_name} ---")
            
            # 1. Click Request Access
            if not wait_and_click("Request Access", timeout=10):
                print("Could not find Request Access button, checking status...")
                return

            time.sleep(2)
            shot(f"perm_{permission_name}_popup.png")

            # 2. Handle System Popup
            if wait_and_click("Open System Settings", timeout=5):
                time.sleep(3) 
                
                # 3. System Settings Interaction
                run("osascript -e 'tell application \"System Settings\" to activate'")
                time.sleep(2)
                
                # Search for "Screen Recording" or "Accessibility" to filter list
                # This is more reliable than scrolling
                # We need to hit Cmd+F in settings or use the search bar
                # Let's try typing the permission name into the search field
                run("osascript -e 'tell application \"System Events\" to keystroke \"f\" using {command down}'") # Cmd+F
                time.sleep(1)
                
                search_img = shot(f"perm_{permission_name}_search.png")
                # Click search field (usually top right, but let's try to find 'Search' text if needed, or just type)
                
                # Type permission name to filter
                run(f"osascript -e 'tell application \"System Events\" to keystroke \"{permission_name}\"'")
                time.sleep(2)
                
                # Now find TeamViewer in the filtered list
                settings_img = shot(f"perm_{permission_name}_settings.png")
                if ocr_find_click(settings_img, "TeamViewer", offset_x=200, offset_y=0):
                    pass # Clicked toggle
                else:
                    # Fallback: sometimes it's just a list item
                    # Try just finding TeamViewer generally
                    ocr_find_click(settings_img, "TeamViewer", offset_x=200, offset_y=0)

                time.sleep(1)
                
                # 4. Handle Authentication Prompt
                auth_img = shot(f"perm_{permission_name}_auth.png")
                # Check for password field existence (text 'Password')
                if ocr_find_click(auth_img, "Password", check_only=True):
                     print("Auth prompt detected.")
                     # Click password field (usually auto-focused)
                     # Type password
                     subprocess.run(f"cliclick t:{USER_PASS}", shell=True)
                     time.sleep(0.5)
                     subprocess.run("cliclick kp:enter", shell=True)
                     print("Password entered.")
                     time.sleep(2)

                # 5. Close Settings
                run("osascript -e 'tell application \"System Settings\" to quit'")
                time.sleep(1)
                
                # Back to TeamViewer
                run("osascript -e 'tell application \"TeamViewer\" to activate'")
                time.sleep(1)
            else:
                print("System popup not found.")

        # ---------------------------
        # MAIN EXECUTION
        # ---------------------------
        
        print("Launching TeamViewer...")
        run("sudo -u vncuser open /Applications/TeamViewer.app")
        time.sleep(10) 
        
        shot("01_launch.png")
        
        # Initial Setup
        # We assume the window appears. We look for the specific text "How do you want"
        # If the window is different, this might fail, but we have screenshots.
        if ocr_find_click(shot("02_wizard.png"), "How do you want to use"):
            print("Setup Wizard detected.")
            # Click "personal use"
            wait_and_click("personal use", timeout=5)
            time.sleep(1)
            wait_and_click("Continue", timeout=5)
            time.sleep(2)
            # Accept License
            wait_and_click("Continue", timeout=5) 
            wait_and_click("Finish", timeout=5)
            time.sleep(3)
        
        # Permissions
        print("Handling Permissions...")
        shot("03_main_window.png")

        if ocr_find_click(shot("04_permissions_panel.png"), "Review System Access", check_only=True):
            # Screen Recording
            handle_permission_workflow("Screen Recording")
            time.sleep(2)
            # Accessibility
            handle_permission_workflow("Accessibility")

            wait_and_click("Close", timeout=3)

        # Extract Info
        print("Extracting ID and Password...")
        time.sleep(5)
        final_shot = shot("10_final.png")
        
        cmd = f"tesseract {final_shot} stdout"
        res = subprocess.run(cmd, shell=True, capture_output=True, text=True)
        text = res.stdout
        print("=== OCR OUTPUT ===")
        print(text)
        
        with open("/tmp/connection_info.txt", "w") as f:
            f.write(text)

        PY

    # -----------------------------
    # Run Automation
    # -----------------------------
    - name: Run Automation
      continue-on-error: true
      run: |
        sudo -u vncuser python3 /tmp/automate_tv.py

    # -----------------------------
    # Upload Artifacts
    # -----------------------------
    - name: Upload Screenshots
      uses: actions/upload-artifact@v4
      with:
        name: debug-visuals
        path: /tmp/debug_screenshots/

    - name: Upload Connection Info
      uses: actions/upload-artifact@v4
      with:
        name: connection-info
        path: /tmp/connection_info.txt

    - name: Keep Alive
      run: echo "Done"