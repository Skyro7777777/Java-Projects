name: macOS Full CRD automation

on:
  workflow_dispatch:

jobs:
  crd:
    runs-on: macos-latest

    env:
      GUI_USER: vncuser
      GUI_PASS: Apple@123
      DEBUG_DIR: /tmp/debug_screenshots

      GOOGLE_SIGNIN_URL: https://accounts.google.com/signin/v2/identifier
      CRD_URL: https://remotedesktop.google.com/access

      POLL_SECONDS: 180
      POLL_INTERVAL: 5

    steps:

    - name: prepare folders
      run: |
        mkdir -p "$DEBUG_DIR"
        chmod 777 "$DEBUG_DIR"

    - name: create gui user
      run: |
        if ! id -u ${GUI_USER}; then
          sudo dscl . -create /Users/${GUI_USER}
          sudo dscl . -create /Users/${GUI_USER} UserShell /bin/bash
          sudo dscl . -create /Users/${GUI_USER} RealName "GUI"
          sudo dscl . -create /Users/${GUI_USER} UniqueID 510
          sudo dscl . -create /Users/${GUI_USER} PrimaryGroupID 20
          sudo dscl . -create /Users/${GUI_USER} NFSHomeDirectory /Users/${GUI_USER}
          sudo dscl . -passwd /Users/${GUI_USER} "${GUI_PASS}"
          sudo createhomedir -c -u ${GUI_USER} || true
        fi

        sudo chown -R ${GUI_USER}:staff "$DEBUG_DIR" || true


    - name: install tools
      run: |
        brew install tesseract cliclick || true


    - name: open safari signin
      run: |
        sudo -u ${GUI_USER} osascript -e 'tell app "Safari" to activate'
        sudo -u ${GUI_USER} osascript -e 'tell app "Safari" to open location "'"$GOOGLE_SIGNIN_URL"'"'
        sleep 4
        sudo -u ${GUI_USER} screencapture -x "$DEBUG_DIR/01_signin.png"


    - name: fill email
      env:
        EMAIL: ${{ secrets.GOOGLE_EMAIL }}
      run: |

        JS='
        var e=document.querySelector("input[type=email]");
        if(e){e.value="EMAILX";}
        var b=document.querySelector("#identifierNext");
        if(b){b.click();}
        '

        JS=${JS/EMAILX/$EMAIL}

        sudo -u ${GUI_USER} osascript \
        -e "tell app \"Safari\" to do JavaScript \"$JS\" in document 1"

        sleep 4
        sudo -u ${GUI_USER} screencapture -x "$DEBUG_DIR/02_email.png"



    - name: fill password
      env:
        PASS: ${{ secrets.GOOGLE_PASS }}
      run: |

        JS='
        var p=document.querySelector("input[type=password]");
        if(p){p.value="PASSX";}
        var b=document.querySelector("#passwordNext");
        if(b){b.click();}
        '

        JS=${JS/PASSX/$PASS}

        sudo -u ${GUI_USER} osascript \
        -e "tell app \"Safari\" to do JavaScript \"$JS\" in document 1"

        sleep 5
        sudo -u ${GUI_USER} screencapture -x "$DEBUG_DIR/03_pass.png"



    - name: OCR loop for 2FA numbers
      run: |

        SECONDS_LEFT=$POLL_SECONDS
        i=0

        while [ $SECONDS_LEFT -gt 0 ]; do

          i=$((i+1))

          IMG="$DEBUG_DIR/2fa_$i.png"

          sudo -u ${GUI_USER} screencapture -x "$IMG" || true

          tesseract "$IMG" /tmp/txt$i || true

          if [ -f /tmp/txt$i.txt ]; then

            echo ===== OCR $i =====

            cat /tmp/txt$i.txt

            grep -Eo '[0-9]{1,4}' /tmp/txt$i.txt || true

          fi

          sleep $POLL_INTERVAL
          SECONDS_LEFT=$((SECONDS_LEFT-POLL_INTERVAL))

        done


    - name: wait for manual phone approval
      run: |
        echo WAITING
        sleep 120



    - name: open CRD page
      run: |

        sudo -u ${GUI_USER} osascript \
        -e 'tell app "Safari" to open location "'"$CRD_URL"'"'

        sleep 6

        sudo -u ${GUI_USER} screencapture \
        -x "$DEBUG_DIR/04_crd.png"



    - name: wait for download
      run: |
        sleep 20
        sudo -u ${GUI_USER} screencapture -x "$DEBUG_DIR/05_download.png"



    - name: install pkg if exists
      run: |

        PKG=$(ls /Users/${GUI_USER}/Downloads/*.pkg 2>/dev/null | head -n1 || true)

        echo PKG=$PKG

        if [ -f "$PKG" ]; then
          sudo installer -pkg "$PKG" -target /
        fi



    - name: permission loop
      run: |

        for i in {1..20}; do

          sudo -u ${GUI_USER} screencapture \
          -x "$DEBUG_DIR/perm_$i.png" || true

          sleep 3

        done



    - name: open CRD again
      run: |

        sudo -u ${GUI_USER} osascript \
        -e 'tell app "Safari" to open location "'"$CRD_URL"'"'

        sleep 10

        sudo -u ${GUI_USER} screencapture \
        -x "$DEBUG_DIR/06_final.png"



    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: crd-debug
        path: /tmp/debug_screenshots/**