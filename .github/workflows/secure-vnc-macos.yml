name: macOS GUI (AskLink Direct Install)
on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    steps:

      - name: Install Tailscale
        run: |
          brew install tailscale
          sudo tailscaled --tun=userspace-networking &
          sleep 5
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-macos-asklink
          for i in {1..10}; do
            IP=$(sudo tailscale ip -4 2>/dev/null || true)
            if [ -n "$IP" ]; then
              echo "TAILSCALE_IP=$IP" >> $GITHUB_ENV
              echo "✅ Tailscale IP: $IP"
              break
            fi
            sleep 5
          done

      - name: Create user vncuser with password Apple@123
        run: |
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/bash
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID "510"
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "Apple@123"
          sudo dscl . -append /Groups/admin GroupMembership vncuser
          sudo createhomedir -c -u vncuser
          echo "✅ Created user: vncuser (password: Apple@123)"

      - name: Download and Install AskLink (official)
        run: |
          # Scrape the AskLink macOS download link from the official AskLink site
          DOWNLOAD_URL=$(curl -s https://www.asklink.com/en/download | grep -oE 'https://.*AskLink.*?\\.dmg' | head -n1)

          echo "Downloading AskLink DMG..."
          curl -L "$DOWNLOAD_URL" -o /tmp/AskLink.dmg

          echo "Mounting AskLink installer..."
          hdiutil attach /tmp/AskLink.dmg -nobrowse -quiet
          cp -R "/Volumes/AskLink/AskLink.app" /Applications/
          hdiutil detach "/Volumes/AskLink" -quiet

          echo "✅ AskLink installed to /Applications"

      - name: Launch AskLink as vncuser
        run: |
          sudo -u vncuser open -a /Applications/AskLink.app
          sleep 15
          echo "✅ AskLink launched - wait for the app to initialize"

      - name: Capture screenshot of current desktop
        run: |
          sudo -u runner screencapture -x /tmp/desktop.png
          echo "Screenshot saved to /tmp/desktop.png"

      - name: Upload screenshot as artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-screenshot
          path: /tmp/desktop.png

      - name: Display connection info and keep alive
        run: |
          echo "========================================================="
          echo "✅ DIAGNOSTIC RUN COMPLETE"
          echo "========================================================="
          echo "Tailscale IP: ${{ env.TAILSCALE_IP }}"
          echo ""
          echo "🔹 ASKLINK (recommended):"
          echo "   ✓ AskLink is installed and running under vncuser"
          echo "   ✓ On Android/iOS, install AskLink and use the ID shown on the runner"
          echo "   ✓ The app will display a 9‑digit connection ID you can use to connect"
          echo ""
          echo "📸 Screenshot artifact available on this run page"
          echo ""
          echo "⏳ Job will stay alive for 6 hours to allow connections."
          echo "========================================================="
          while true; do sleep 3600; done