
name: macOS GUI (AskLink + Tailscale)
on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    steps:
      - name: Install and connect Tailscale
        run: |
          brew install tailscale
          sudo tailscaled --tun=userspace-networking &
          sleep 5
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-macos-asklink
          for i in {1..10}; do
            IP=$(sudo tailscale ip -4 2>/dev/null || true)
            if [ -n "$IP" ]; then
              echo "TAILSCALE_IP=$IP" >> $GITHUB_ENV
              break
            fi
            sleep 5
          done

      - name: Create user vncuser with password Apple@123
        run: |
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/bash
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID "510"
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "Apple@123"
          sudo dscl . -append /Groups/admin GroupMembership vncuser
          sudo createhomedir -c -u vncuser
          echo "✅ Created user: vncuser (password: Apple@123)"

      - name: Install AskLink
        run: |
          # AskLink can be installed via Homebrew Cask
          brew install --cask asklink
          echo "✅ AskLink installed. Please ensure it's running and note the Device ID/Password from its interface."
          # Note: Starting AskLink might require user interaction or a specific command.
          # Often, these apps start automatically after installation or have a launchctl service.
          # You might need to manually start it from the GUI if it doesn't start automatically.
          # For now, we'll assume it's running. You may need to open the app manually if the screen becomes visible later.
          echo "If AskLink is not running, you may need to start it from the Applications folder once connected via another method (like VNC)."

      - name: Wake display and keep alive
        run: |
          brew install cliclick
          cliclick c:. m:0,0 c:.
          echo "========================================================="
          echo "✅ SERVICES READY"
          echo "========================================================="
          echo "Tailscale IP: ${{ env.TAILSCALE_IP }}"
          echo ""
          echo "🔹 AskLink:"
          echo "   Open the AskLink app on your Android device."
          echo "   You will need the Device ID and temporary password displayed on the runner's AskLink interface."
          echo "   Since you can't see it yet, you might need to use the VNC fallback ONCE to view it."
          echo ""
          echo "🔹 VNC (fallback to see AskLink's code):"
          echo "   If AskLink's connection code isn't visible, use VNC to connect just once to view it."
          echo "   Port: 5900, VNC Password: Apple@12, Login: vncuser / Apple@123"
          echo ""
          echo "📱 ONCE YOU HAVE THE ASKLINK CODE:"
          echo "   1. Enter it in your Android AskLink app."
          echo "   2. You should see the macOS desktop via AskLink's virtual display, bypassing the black screen."
          echo ""
          echo "⏳ Job will stay alive for 6 hours."
          echo "========================================================="
          while true; do sleep 3600; done