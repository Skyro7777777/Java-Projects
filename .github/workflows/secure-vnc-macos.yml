name: Secure NoMachine (macOS Tailscale Remote Desktop) - True RDP Alternative

on:
  workflow_dispatch:

jobs:
  secure-nomachine:
    runs-on: macos-latest
    timeout-minutes: 420          # 25200 seconds = 7 hours

    steps:
      - name: Create Admin User with Fixed Password
        run: |
          password="Apple@123"
          
          sudo sysadminctl -addUser Skyro \
            -password "$password" \
            -fullName "Skyro" \
            -admin
          
          sudo dscl . -append /Groups/admin GroupMembership Skyro
          
          echo "NM_USER=Skyro" >> $GITHUB_ENV
          echo "NM_PASSWORD=$password" >> $GITHUB_ENV
          
          if ! id Skyro &>/dev/null; then
              echo "User creation failed"
              exit 1
          fi
          
          echo "✅ Skyro admin user created with password: Apple@123"

      - name: Install NoMachine Server (True RDP-like GUI)
        run: |
          # Latest free version (update URL from https://www.nomachine.com/download if needed)
          curl -L -o nomachine.pkg "https://downloads.nomachine.com/download/?id=7&platform=mac"
          
          sudo installer -pkg nomachine.pkg -target /
          rm -f nomachine.pkg
          
          # Start the service
          sudo /usr/NX/bin/nxserver --restart || true
          
          echo "✅ NoMachine installed and running (port 4000)"

      - name: Connect Tailscale (Official Action)
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          tags: tag:gh-runner-macos
          statedir: /tmp/tailscale-state

      - name: Set Hostname + Get Tailscale IP
        run: |
          tailscale set --hostname=gh-runner-macos-$GITHUB_RUN_ID
          
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
          echo "✅ Tailscale IP: $TS_IP"

      - name: Verify NoMachine Accessibility
        run: |
          echo "Tailscale IP: ${{ env.TAILSCALE_IP }}"
          
          if ! nc -z -w 5 "${{ env.TAILSCALE_IP }}" 4000; then
              echo "TCP connection to NoMachine port 4000 failed"
              exit 1
          fi
          echo "✅ TCP connectivity successful!"

      - name: Maintain Connection
        run: |
          echo ""
          echo "=== NoMachine ACCESS (True RDP replacement) ==="
          echo "Address: ${{ env.TAILSCALE_IP }}:4000"
          echo "Username: Skyro"
          echo "Password: Apple@123"
          echo "=================="
          echo ""
          echo "✅ Download FREE NoMachine client (Windows/Android/macOS): https://www.nomachine.com/download"
          echo "Connect → enter the IP above → Username + Password"
          echo "You will get a full Skyro desktop (no black screen ever)"
          
          while true; do
              echo "[$(date)] NoMachine Active - Use Ctrl+C to terminate"
              sleep 300
          done
