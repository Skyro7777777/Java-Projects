name: macOS GUI RustDesk – Grant Screen Recording (direct method)

on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    env:
      GUI_USER: vncuser
      GUI_PASS: Apple@123
      DEBUG_DIR: /tmp/debug_screenshots
      RUSTDESK_DMG_URL: https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.dmg
      SCRIPT_URL: "https://raw.githubusercontent.com/Skyro7777777/Java-Projects/refs/heads/main/grant__screen_recording.py"

    steps:
      - name: Prepare debug folder (writable)
        run: |
          mkdir -p "${DEBUG_DIR}"
          chmod 777 "${DEBUG_DIR}"

      - name: Create GUI user (vncuser)
        run: |
          if ! id -u "${GUI_USER}" >/dev/null 2>&1; then
            sudo dscl . -create /Users/${GUI_USER}
            sudo dscl . -create /Users/${GUI_USER} UserShell /bin/bash
            sudo dscl . -create /Users/${GUI_USER} RealName "VNC User"
            sudo dscl . -create /Users/${GUI_USER} UniqueID "510"
            sudo dscl . -create /Users/${GUI_USER} PrimaryGroupID 20
            sudo dscl . -create /Users/${GUI_USER} NFSHomeDirectory /Users/${GUI_USER}
            sudo dscl . -passwd /Users/${GUI_USER} "${GUI_PASS}"
            sudo dscl . -append /Groups/admin GroupMembership ${GUI_USER}
            sudo createhomedir -c -u ${GUI_USER} >/dev/null 2>&1 || true
            echo "Created user ${GUI_USER}"
          else
            echo "User ${GUI_USER} already exists"
          fi
          sudo chown -R ${GUI_USER}:staff "${DEBUG_DIR}"
          chmod -R 777 "${DEBUG_DIR}"

      - name: Install Homebrew tools
        run: |
          brew install tesseract cliclick || true
          echo "TESSERACT: $(which tesseract || true)"
          echo "CLICLICK: $(which cliclick || true)"

      - name: Download and install RustDesk
        run: |
          curl -L -o /tmp/rustdesk.dmg "${RUSTDESK_DMG_URL}"
          hdiutil attach /tmp/rustdesk.dmg -mountpoint /Volumes/RustDesk -nobrowse || true
          cp -R "/Volumes/RustDesk/RustDesk.app" /Applications/ || true
          hdiutil detach "/Volumes/RustDesk" || true
          echo "RustDesk install attempted"

      - name: Reset TCC permissions + initial launch
        run: |
          sudo -u ${GUI_USER} tccutil reset ScreenCapture com.carriez.RustDesk || true
          sudo -u ${GUI_USER} tccutil reset Accessibility com.carriez.RustDesk || true
          sudo -u ${GUI_USER} open -a /Applications/RustDesk.app || true
          sleep 15
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/01_after_initial_launch.png" || true

      - name: Download automation script
        run: |
          curl -fsSL "${SCRIPT_URL}" -o /tmp/grant_screen_recording.py
          sudo chown ${GUI_USER}:staff /tmp/grant_screen_recording.py || true
          sudo chmod +x /tmp/grant_screen_recording.py

      - name: Run Python automation script
        continue-on-error: true
        run: |
          sudo -u ${GUI_USER} env PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin" \
            python3 /tmp/grant_screen_recording.py || true
          sleep 10
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/09_after_automation.png" || true

      - name: Extra background "Allow" dialog clicks
        run: |
          sudo -u ${GUI_USER} osascript -e 'tell application "System Events" to repeat 12 times
            try
              repeat with p in (every process)
                repeat with w in (every window of p)
                  try
                    if exists button "Allow" of w then click button "Allow" of w
                  end try
                end repeat
              end repeat
            end try
            delay 0.5
          end repeat' || true
          sleep 4
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/10_after_allow_clicks.png" || true

      - name: Capture final screenshots + attempt OCR on RustDesk ID
        run: |
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x /tmp/final_rustdesk.png || true
          sudo chown ${GUI_USER}:staff /tmp/final_rustdesk.png || true
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/11_final_rustdesk.png" || true
          sudo -u ${GUI_USER} env PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin" \
            tesseract /tmp/final_rustdesk.png /tmp/ocr_result --psm 6 || true
          echo "--- FINAL OCR OUTPUT (ID should be visible) ---"
          cat /tmp/ocr_result.txt || echo "OCR failed or no text found"

      - name: Upload all debug screenshots
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            /tmp/debug_screenshots/**
            /tmp/final_rustdesk.png
          if-no-files-found: ignore

      - name: Keep runner alive for manual inspection
        run: |
          echo "Runner will sleep for 6 hours. Download artifacts first!"
          for i in {1..6}; do echo "Sleeping hour $i/6"; sleep 3600; done