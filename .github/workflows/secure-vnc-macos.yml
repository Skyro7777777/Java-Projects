name: macOS GUI Remotix Agent – Grant Screen Recording (2026 version)

on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    env:
      GUI_USER: vncuser
      GUI_PASS: Apple@123
      DEBUG_DIR: /tmp/debug_screenshots
      REMOTIX_DMG_URL: "https://downloads.remotix.com/rx-mac/Remotix-5.1.1-20764.dmg"
      SCRIPT_URL: "https://raw.githubusercontent.com/Skyro7777777/Java-Projects/refs/heads/main/grant__screen_recording.py"

    steps:
      - name: Prepare debug folder
        run: |
          mkdir -p "${DEBUG_DIR}"
          chmod 777 "${DEBUG_DIR}"

      - name: Create GUI user (vncuser)
        run: |
          if ! id -u "${GUI_USER}" >/dev/null 2>&1; then
            sudo dscl . -create /Users/${GUI_USER}
            sudo dscl . -create /Users/${GUI_USER} UserShell /bin/bash
            sudo dscl . -create /Users/${GUI_USER} RealName "VNC User"
            sudo dscl . -create /Users/${GUI_USER} UniqueID "510"
            sudo dscl . -create /Users/${GUI_USER} PrimaryGroupID 20
            sudo dscl . -create /Users/${GUI_USER} NFSHomeDirectory /Users/${GUI_USER}
            sudo dscl . -passwd /Users/${GUI_USER} "${GUI_PASS}"
            sudo dscl . -append /Groups/admin GroupMembership ${GUI_USER}
            sudo createhomedir -c -u ${GUI_USER} >/dev/null 2>&1 || true
          fi
          sudo chown -R ${GUI_USER}:staff "${DEBUG_DIR}"
          chmod -R 777 "${DEBUG_DIR}"

      - name: Install tools
        run: |
          brew install tesseract cliclick || true

      - name: Download & Install Remotix Agent
        run: |
          curl -L -o /tmp/remotix.dmg "${REMOTIX_DMG_URL}"
          hdiutil attach /tmp/remotix.dmg -mountpoint /Volumes/Remotix -nobrowse || true
          cp -R "/Volumes/Remotix/Remotix Agent.app" /Applications/ || true
          hdiutil detach "/Volumes/Remotix" || true
          echo "Remotix Agent installed"

      - name: Reset TCC + initial launch
        run: |
          sudo -u ${GUI_USER} tccutil reset ScreenCapture com.remotix.agent || true
          sudo -u ${GUI_USER} tccutil reset Accessibility com.remotix.agent || true
          sudo -u ${GUI_USER} open -a "/Applications/Remotix Agent.app" || true
          sleep 15
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/01_after_launch.png" || true

      - name: Download & run automation script
        run: |
          curl -fsSL "${SCRIPT_URL}" -o /tmp/grant_screen_recording.py
          sudo chown ${GUI_USER}:staff /tmp/grant_screen_recording.py
          sudo chmod +x /tmp/grant_screen_recording.py
          sudo -u ${GUI_USER} env PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin" \
            python3 /tmp/grant_screen_recording.py || true
          sleep 10
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/09_after_script.png" || true

      - name: Extra Allow clicks
        run: |
          sudo -u ${GUI_USER} osascript -e 'tell application "System Events" to repeat 12 times
            try
              repeat with p in (every process)
                repeat with w in (every window of p)
                  try
                    if exists button "Allow" of w then click button "Allow" of w
                  end try
                end repeat
              end repeat
            end try
            delay 0.5
          end repeat' || true
          sleep 5
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/10_after_extra_clicks.png" || true

      - name: Final screenshots + OCR
        run: |
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x /tmp/remotix_final.png || true
          sudo chown ${GUI_USER}:staff /tmp/remotix_final.png || true
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/11_final_remotix.png" || true
          sudo -u ${GUI_USER} tesseract /tmp/remotix_final.png /tmp/remotix_ocr --psm 6 || true
          echo "--- FINAL OCR (ID should appear) ---"
          cat /tmp/remotix_ocr.txt || echo "No OCR output"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-screenshots
          path: |
            /tmp/debug_screenshots/**
            /tmp/remotix_final.png
          if-no-files-found: ignore

      - name: Keep runner alive
        run: |
          echo "Download artifacts now - runner alive 6h"
          for i in {1..6}; do sleep 3600; done