name: macOS GUI Chrome Remote Desktop Automation

on:
  workflow_dispatch:

jobs:
  gui_crd:
    runs-on: macos-latest
    env:
      GUI_USER: vncuser
      GUI_PASS: Apple@123
      DEBUG_DIR: /tmp/debug_screenshots
      CRD_URL: https://remotedesktop.google.com/access
      GOOGLE_SIGNIN_URL: https://accounts.google.com/signin/v2/identifier

    steps:
      - name: Prepare debug folder
        run: |
          mkdir -p "${DEBUG_DIR}"
          chmod 777 "${DEBUG_DIR}"

      - name: Create GUI user (vncuser)
        run: |
          if ! id -u "${GUI_USER}" >/dev/null 2>&1; then
            sudo dscl . -create /Users/${GUI_USER}
            sudo dscl . -create /Users/${GUI_USER} UserShell /bin/bash
            sudo dscl . -create /Users/${GUI_USER} RealName "VNC User"
            sudo dscl . -create /Users/${GUI_USER} UniqueID "510"
            sudo dscl . -create /Users/${GUI_USER} PrimaryGroupID 20
            sudo dscl . -create /Users/${GUI_USER} NFSHomeDirectory /Users/${GUI_USER}
            sudo dscl . -passwd /Users/${GUI_USER} "${GUI_PASS}"
            sudo dscl . -append /Groups/admin GroupMembership ${GUI_USER}
            sudo createhomedir -c -u ${GUI_USER} >/dev/null 2>&1 || true
          fi
          sudo chown -R ${GUI_USER}:staff "${DEBUG_DIR}"
          chmod -R 777 "${DEBUG_DIR}"

      - name: Open Chrome Remote Desktop in Safari
        run: |
          sudo -u ${GUI_USER} open -a "Safari" "${CRD_URL}"
          sleep 8
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/01_open_crd.png"

      - name: Fill Google email
        env:
          EMAIL: githubrandomness777@gmail.com
        run: |
          # Create JS file to safely fill email
          cat > /tmp/email.js <<EOF
var e=document.querySelector("input[type=email]");
if(e){e.value="$EMAIL";}
var b=document.querySelector("#identifierNext");
if(b){b.click();}
EOF

          # AppleScript reads JS file
          cat > /tmp/run_email.applescript <<'EOF'
tell application "Safari"
    do JavaScript (read POSIX file "/tmp/email.js") in document 1
end tell
EOF

          sudo -u ${GUI_USER} osascript /tmp/run_email.applescript
          sleep 5
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/02_email.png"

      - name: Fill Google password
        env:
          PASS: "YOUR_PASSWORD_HERE"
        run: |
          cat > /tmp/pass.js <<EOF
var p=document.querySelector("input[type=password]");
if(p){p.value="$PASS";}
var b=document.querySelector("#passwordNext");
if(b){b.click();}
EOF

          cat > /tmp/run_pass.applescript <<'EOF'
tell application "Safari"
    do JavaScript (read POSIX file "/tmp/pass.js") in document 1
end tell
EOF

          sudo -u ${GUI_USER} osascript /tmp/run_pass.applescript
          sleep 5
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/03_pass.png"

      - name: Wait for 2FA / approval prompt
        run: |
          echo "Pausing 120s for 2FA approval. Check phone, approve number."
          sleep 120
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/04_2fa_check.png"

      - name: Handle potential 2FA code (OCR)
        run: |
          brew install tesseract || true
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/05_2fa_capture.png"
          tesseract "${DEBUG_DIR}/05_2fa_capture.png" "${DEBUG_DIR}/05_2fa_capture" -l eng
          echo "OCR output (check number for approval):"
          cat "${DEBUG_DIR}/05_2fa_capture.txt"

      - name: Confirm CRD main page loaded
        run: |
          sleep 5
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/06_crd_main.png"

      - name: Keep runner alive for interaction
        run: |
          echo "Runner alive 10m. Use artifacts to check screens."
          for i in {1..10}; do sleep 60; done

      - name: Upload all screenshots
        uses: actions/upload-artifact@v4
        with:
          name: crd-screenshots
          path: /tmp/debug_screenshots/**
          if-no-files-found: ignore