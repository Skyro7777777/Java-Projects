name: Secure VNC (macOS Tailscale Remote Desktop) - Using Runner Session

on:
  workflow_dispatch:

jobs:
  secure-vnc:
    runs-on: macos-latest
    timeout-minutes: 420

    steps:
      - name: Configure VNC for Runner User (Most Reliable)
        run: |
          # The macOS runner already has an active GUI session for 'runner' user
          # We'll use this existing session instead of creating a new user
          
          echo "RUNNER_USER=runner" >> $GITHUB_ENV
          echo "VNC_PASSWORD=Apple@123" >> $GITHUB_ENV
          
          # Set password for runner user if not set
          echo "Apple@123" | sudo passwd runner --stdin 2>/dev/null || \
            sudo dscl . -passwd /Users/runner "Apple@123" 2>/dev/null || true
          
          echo "✅ Runner user configured with password: Apple@123"

      - name: Reset TCC Permissions
        run: |
          sudo tccutil reset ScreenCapture 2>/dev/null || true
          sudo tccutil reset Accessibility 2>/dev/null || true
          echo "✅ TCC permissions reset"

      - name: Configure Remote Management for Runner User
        run: |
          # Stop existing
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -deactivate -stop 2>/dev/null || true
          
          sleep 2
          
          # Configure for runner user (who already has GUI session)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure \
            -access -on \
            -users runner \
            -privs -all \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "Apple@123" \
            -restart -agent
          
          echo "✅ VNC configured for runner user (active GUI session)"

      - name: Ensure Desktop is Visible
        run: |
          # The runner user already has an active session
          # Just ensure Finder and desktop are visible
          RUNNER_UID=$(id -u runner)
          
          # Open Finder to show desktop
          sudo launchctl asuser $RUNNER_UID open -a Finder
          
          # Open Terminal for something to see
          sudo launchctl asuser $RUNNER_UID open -a Terminal
          
          # Open System Preferences as a visual confirmation
          sudo launchctl asuser $RUNNER_UID open -a "System Preferences"
          
          # Prevent sleep
          sudo pmset -a displaysleep 0
          sudo pmset -a sleep 0
          
          # Use caffeinate to keep display awake
          sudo caffeinate -d -i -m -u &
          
          echo "✅ Desktop applications launched"

      - name: Wait for Initialization
        run: |
          echo "Waiting for VNC to be ready..."
          sleep 10
          
          echo "=== GUI Processes ==="
          ps aux | grep -E "(Finder|Dock|Terminal)" | grep -v grep

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          tags: tag:gh-runner-macos
          statedir: /tmp/tailscale-state

      - name: Set Hostname + Get IP
        run: |
          tailscale set --hostname=gh-runner-macos-$GITHUB_RUN_ID
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
          echo "✅ Tailscale IP: $TS_IP"

      - name: Verify VNC
        run: |
          if nc -z -w 5 "${{ env.TAILSCALE_IP }}" 5900; then
              echo "✅ VNC port 5900 is open"
          else
              echo "❌ VNC port 5900 is not accessible"
              exit 1
          fi

      - name: Keep Alive
        run: |
          RUNNER_UID=$(id -u runner)
          
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║              VNC CONNECTION INFO                 ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  Address:  vnc://${{ env.TAILSCALE_IP }}:5900         ║"
          echo "║  Username: runner                                ║"
          echo "║  Password: Apple@123                             ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""
          echo "✅ This uses the runner's existing GUI session"
          echo "   (No black screen - real desktop is displayed)"
          echo ""
          
          while true; do
              # Keep apps running
              if ! pgrep -u runner Terminal > /dev/null; then
                  sudo launchctl asuser $RUNNER_UID open -a Terminal 2>/dev/null || true
              fi
              echo "[$(date)] VNC Active"
              sleep 300
          done
