name: macOS GUI RustDesk (FULL + ALL SCREENSHOTS)

on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    env:
      GUI_USER: vncuser
      GUI_PASS: Apple@123
      DEBUG_DIR: /tmp/debug_screenshots
      RUSTDESK_DMG_URL: https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.dmg

    steps:
      - name: Prepare debug folder (writable)
        run: |
          mkdir -p "${DEBUG_DIR}"
          chmod 777 "${DEBUG_DIR}"

      - name: Create GUI user (vncuser)
        run: |
          if ! id -u "${GUI_USER}" >/dev/null 2>&1; then
            sudo dscl . -create /Users/${GUI_USER}
            sudo dscl . -create /Users/${GUI_USER} UserShell /bin/bash
            sudo dscl . -create /Users/${GUI_USER} RealName "VNC User"
            sudo dscl . -create /Users/${GUI_USER} UniqueID "510"
            sudo dscl . -create /Users/${GUI_USER} PrimaryGroupID 20
            sudo dscl . -create /Users/${GUI_USER} NFSHomeDirectory /Users/${GUI_USER}
            sudo dscl . -passwd /Users/${GUI_USER} "${GUI_PASS}"
            sudo dscl . -append /Groups/admin GroupMembership ${GUI_USER}
            sudo createhomedir -c -u ${GUI_USER} >/dev/null 2>&1 || true
            echo "Created user ${GUI_USER}"
          else
            echo "User ${GUI_USER} already exists"
          fi
          # ensure debug dir ownership
          sudo chown -R ${GUI_USER}:staff "${DEBUG_DIR}"
          chmod -R 777 "${DEBUG_DIR}"

      - name: Install Homebrew tools (tesseract, cliclick)
        run: |
          brew install tesseract cliclick || true
          echo "TESSERACT: $(which tesseract || true)"
          echo "CLICLICK: $(which cliclick || true)"

      - name: Download & Install RustDesk
        run: |
          curl -L -o /tmp/rustdesk.dmg "${RUSTDESK_DMG_URL}"
          hdiutil attach /tmp/rustdesk.dmg -mountpoint /Volumes/RustDesk -nobrowse || true
          cp -R "/Volumes/RustDesk/RustDesk.app" /Applications/ || true
          hdiutil detach "/Volumes/RustDesk" || true
          echo "RustDesk install attempted"

      - name: Launch RustDesk as GUI user and take initial screenshot
        run: |
          sudo -u ${GUI_USER} open -a /Applications/RustDesk.app || true
          sleep 12
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/01_after_launch.png" || true

      - name: Write automation script (as file) — will be run as GUI user
        run: |
          cat > /tmp/grant_screen_recording.py <<'PY'
#!/usr/bin/env python3
# Best-effort UI automation: click Allow/Open System Settings, open System Settings,
# search for "RustDesk", try to toggle switch, and save debug screenshots.
import subprocess, time, pathlib

DEBUG = pathlib.Path("/tmp/debug_screenshots")
DEBUG.mkdir(parents=True, exist_ok=True)

def shot(name):
    path = DEBUG / name
    try:
        subprocess.run(["/usr/sbin/screencapture", "-x", str(path)], check=False)
    except Exception as e:
        print("screencapture error:", e)

def applescript(script):
    try:
        subprocess.run(["osascript", "-e", script], check=False)
    except Exception as e:
        print("osascript error:", e)

# 0) initial
shot("02_start.png")

# 1) aggressively click standard dialog buttons ("Allow", "Open System Settings", "Open System Preferences")
for i in range(12):
    script = '''
    tell application "System Events"
      repeat with p in (every process)
        try
          repeat with w in (every window of p)
            try
              repeat with b in {"Allow","Open System Settings","Open System Preferences"}
                try
                  if exists button b of w then
                    click button b of w
                    delay 0.6
                  end if
                end try
              end repeat
            end try
          end repeat
        end try
      end repeat
    end tell
    '''
    applescript(script)
    shot(f"03_clear_{i}.png")
    time.sleep(0.7)

# 2) open System Settings (macOS 13+/14+)
applescript('tell application "System Settings" to activate')
time.sleep(2)
shot("04_settings_opened.png")

# 3) attempt to search RustDesk (send keystrokes)
applescript('tell application "System Events" to keystroke "RustDesk"')
time.sleep(2)
shot("05_search_typed.png")

# 4) try cliclick coordinate fallback positions (common area for toggles)
cands = [(1000,360),(1100,420),(1200,480),(900,420)]
for x,y in cands:
    # prefer installed cliclick binary
    try:
        subprocess.run(["/usr/local/bin/cliclick", f"c:{x},{y}"], check=False)
    except Exception:
        try:
            subprocess.run(["/opt/homebrew/bin/cliclick", f"c:{x},{y}"], check=False)
        except Exception:
            # apple-script coordinate click fallback
            applescript(f'tell application "System Events" to click at {{{x},{y}}}')
    time.sleep(0.6)
    shot(f"06_click_{x}_{y}.png")

# 5) another pass to clear any remaining dialogs
for i in range(6):
    applescript(script)
    shot(f"07_posttoggle_{i}.png")
    time.sleep(0.7)

# 6) final screenshots
shot("08_final_system.png")
# take /tmp/rustdesk.png for OCR later
try:
    subprocess.run(["/usr/sbin/screencapture","-x","/tmp/rustdesk.png"], check=False)
except Exception as e:
    print("final screencapture failed:", e)
print("Automation script done")
PY
          sudo chown ${GUI_USER}:staff /tmp/grant_screen_recording.py || true
          sudo chmod +x /tmp/grant_screen_recording.py || true

      - name: Run automation script as GUI user (best-effort)
        continue-on-error: true
        run: |
          sudo -u ${GUI_USER} env PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin" \
            python3 /tmp/grant_screen_recording.py || true
          sleep 2
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/09_after_script.png" || true

      - name: Extra attempt to click remaining dialogs (AppleScript) as GUI user
        run: |
          sudo -u ${GUI_USER} env PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin" \
            osascript -e 'tell application "System Events" to repeat 6 times
              try
                repeat with p in (every process)
                  try
                    repeat with w in (every window of p)
                      try
                        if exists button "Allow" of w then click button "Allow" of w
                      end try
                    end repeat
                  end try
                end repeat
              end try
            end repeat' || true
          sleep 1
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/10_after_extra_clicks.png" || true

      - name: Capture final RustDesk screenshot as GUI user
        run: |
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x /tmp/rustdesk.png || true
          sudo chown ${GUI_USER}:staff /tmp/rustdesk.png || true
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/11_final_rustdesk.png" || true

      - name: OCR attempt (best-effort)
        run: |
          sudo -u ${GUI_USER} env PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin" \
            bash -lc 'if [ -f /tmp/rustdesk.png ]; then tesseract /tmp/rustdesk.png /tmp/rustdesk_ocr || true; echo "--- OCR TEXT ---"; cat /tmp/rustdesk_ocr.txt || true; else echo "no rustdesk.png to OCR"; fi'

      - name: Upload ALL screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-screenshots
          path: |
            /tmp/debug_screenshots/**
            /tmp/rustdesk.png
          if-no-files-found: ignore

      - name: Keep runner alive (manual debug window)
        run: |
          echo "Runner will remain alive for manual debugging (6 hours). Download artifacts first."
          for i in {1..6}; do echo "sleeping $i"; sleep 3600; done