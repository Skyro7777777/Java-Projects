name: macOS GUI Final Diagnostic (with Screenshot)
on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    steps:
      - name: Install Tailscale
        run: |
          brew install tailscale
          sudo tailscaled --tun=userspace-networking &
          sleep 5
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-macos-diag
          for i in {1..10}; do
            IP=$(sudo tailscale ip -4 2>/dev/null || true)
            if [ -n "$IP" ]; then
              echo "TAILSCALE_IP=$IP" >> $GITHUB_ENV
              break
            fi
            sleep 5
          done

      - name: Create user vncuser with password Apple@123
        run: |
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/bash
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID "510"
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "Apple@123"
          sudo dscl . -append /Groups/admin GroupMembership vncuser
          sudo createhomedir -c -u vncuser
          echo "✅ Created user: vncuser (password: Apple@123)"

      - name: Enable Screen Sharing (VNC) with password Apple@12
        run: |
          sudo defaults write /var/db/launchd.db/com.apple.launchd/overrides.plist com.apple.screensharing -dict Disabled -bool false
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvncpw -vncpw "Apple@12"
          sudo launchctl unload /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
          sleep 5
          echo "✅ VNC ready on port 5900 (password: Apple@12)"

      - name: Install and start NoMachine
        run: |
          brew install --cask nomachine
          sudo launchctl load /Library/LaunchDaemons/com.nomachine.nxserver.plist 2>/dev/null || true
          sleep 15
          echo "✅ NoMachine ready on port 4000 (login with vncuser / Apple@123)"

      - name: Wake display
        run: |
          brew install cliclick
          cliclick c:. m:0,0 c:. kd:ctrl ku:ctrl
          echo "✅ Display wake commands sent"

      - name: Capture screenshot of current desktop
        run: |
          # Screencapture as the console user (runner) to see what's actually displayed
          sudo -u runner screencapture -x /tmp/desktop.png
          echo "Screenshot saved to /tmp/desktop.png"

      - name: Upload screenshot as artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-screenshot
          path: /tmp/desktop.png

      - name: Display connection info and keep alive
        run: |
          echo "========================================================="
          echo "✅ DIAGNOSTIC RUN COMPLETE"
          echo "========================================================="
          echo "Tailscale IP: ${{ env.TAILSCALE_IP }}"
          echo ""
          echo "🔹 VNC (built-in):"
          echo "   Port: 5900"
          echo "   VNC Password: Apple@12"
          echo "   After connecting, log in with: vncuser / Apple@123"
          echo ""
          echo "🔹 NoMachine (recommended for headless):"
          echo "   Port: 4000"
          echo "   Login: vncuser / Apple@123"
          echo ""
          echo "📸 A screenshot of the current desktop has been uploaded as an artifact."
          echo "   Download it from the workflow run page to see if the system is rendering anything."
          echo ""
          echo "⏳ Job will stay alive for 6 hours for you to connect."
          echo "========================================================="
          while true; do sleep 3600; done