name: Secure NoMachine macOS Remote Desktop (Tailscale)

on:
  workflow_dispatch:

jobs:
  remote-macos:
    runs-on: macos-latest
    timeout-minutes: 420

    steps:

    # ----------------------------------------
    # Step 1: Install NoMachine safely
    # ----------------------------------------
    - name: Install NoMachine Server + Virtual Desktop
      run: |
        echo "Installing NoMachine..."
        brew install --cask nomachine

        # Path inside app bundle
        NX_SERVER="/Applications/NoMachine.app/Contents/MacOS/nxserver"

        echo "Waiting for nxserver binary inside app bundle..."
        for i in {1..30}; do
          [ -f "$NX_SERVER" ] && break
          sleep 2
        done

        if [ ! -f "$NX_SERVER" ]; then
          echo "❌ nxserver binary not found! Installation failed."
          ls /Applications/NoMachine.app/Contents/MacOS || true
          exit 1
        fi

        # Start virtual desktop mode (needed on headless runner)
        sudo "$NX_SERVER" --virtualdesktop yes || true
        sudo "$NX_SERVER" --restart

        echo "✅ NoMachine installed and virtual desktop started"

    # ----------------------------------------
    # Step 2: Connect Tailscale
    # ----------------------------------------
    - name: Connect Tailscale
      uses: tailscale/github-action@v4
      with:
        authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
        statedir: /tmp/tailscale-state

    # ----------------------------------------
    # Step 3: Get Tailscale IP
    # ----------------------------------------
    - name: Get Tailscale IP
      run: |
        TS_IP=$(tailscale ip -4)
        echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
        echo "Tailscale IP saved: $TS_IP"

    # ----------------------------------------
    # Step 4: Verify NoMachine Port
    # ----------------------------------------
    - name: Verify NoMachine Accessibility
      run: |
        sleep 5
        echo "Checking TCP port 4000 on ${{ env.TAILSCALE_IP }}..."
        nc -z -w 5 "${{ env.TAILSCALE_IP }}" 4000 || {
          echo "❌ Port 4000 not reachable!"
          exit 1
        }
        echo "✅ NoMachine port 4000 is open"

    # ----------------------------------------
    # Step 5: Keep workflow alive for connection
    # ----------------------------------------
    - name: Maintain session
      run: |
        echo ""
        echo "=== CONNECT WITH NOMACHINE ==="
        echo "Protocol: NX (NoMachine)"
        echo "Host: ${{ env.TAILSCALE_IP }}:4000"
        echo "Username: runner"
        echo "Password: leave blank"
        echo "⚠ First connection may take 20–40 seconds for virtual desktop to render"
        echo "=============================="
        echo ""
        while true; do
          date
          sleep 300
        done
