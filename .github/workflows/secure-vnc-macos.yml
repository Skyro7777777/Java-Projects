name: macOS GUI TeamViewer (Full Access + ID Capture)

on:
  workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest

    steps:
      # -----------------------------
      # Prepare debug folder
      # -----------------------------
      - name: Prepare debug folder
        run: mkdir -p /tmp/debug_screenshots

      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install tools
        run: |
          brew install tesseract cliclick
          which tesseract
          which cliclick

      # -----------------------------
      # Download and install TeamViewer 15
      # -----------------------------
      - name: Install TeamViewer
        run: |
          curl -L -o /tmp/teamviewer.dmg "https://dl.teamviewer.com/download/version_15x/TeamViewer.dmg"
          hdiutil attach /tmp/teamviewer.dmg -mountpoint /Volumes/TeamViewer
          sudo cp -R /Volumes/TeamViewer/TeamViewer.app /Applications/
          hdiutil detach /Volumes/TeamViewer

      # -----------------------------
      # Pre‑grant Accessibility to the automation tools (TCC hack – may fail, but we try)
      # -----------------------------
      - name: Attempt to pre‑grant accessibility (experimental)
        continue-on-error: true
        run: |
          USER_HOME=~
          TCC_DB="$USER_HOME/Library/Application Support/com.apple.TCC/TCC.db"
          if [ -f "$TCC_DB" ]; then
            # Back up first
            cp "$TCC_DB" /tmp/TCC.db.backup
            # Insert entries for python3 and cliclick (if they don't exist)
            sqlite3 "$TCC_DB" <<EOF
            INSERT OR IGNORE INTO access (service, client, client_type, allowed, prompt_count, csreq) VALUES
              ('kTCCServiceAccessibility', '/usr/bin/python3', 0, 1, 1, NULL),
              ('kTCCServiceAccessibility', '/usr/local/bin/cliclick', 0, 1, 1, NULL);
            EOF
            echo "TCC database modified (if supported)."
          else
            echo "TCC database not found – skipping."
          fi

      # -----------------------------
      # Launch TeamViewer
      # -----------------------------
      - name: Launch TeamViewer
        run: |
          open /Applications/TeamViewer.app
          sleep 10
          screencapture -x /tmp/debug_screenshots/01_teamviewer_launch.png

      # -----------------------------
      # Write the automation script (Python + AppleScript + cliclick)
      # -----------------------------
      - name: Write automation script
        run: |
          cat << 'PY' > /tmp/grant_teamviewer.py
          import subprocess
          import time
          import re
          import pathlib
          import sys

          DEBUG = pathlib.Path("/tmp/debug_screenshots")
          DEBUG.mkdir(exist_ok=True)

          def shot(name):
              p = DEBUG / name
              subprocess.run(f"screencapture -x {p}", shell=True)

          def applescript(script):
              """Run AppleScript and return output/error."""
              result = subprocess.run(["osascript", "-e", script], capture_output=True, text=True)
              return result.stdout.strip(), result.returncode

          def click_button_by_name(button_name, window_title=None, process="TeamViewer"):
              """Try to click a button using AppleScript GUI scripting."""
              script = f'''
              tell application "System Events"
                  tell process "{process}"
                      set frontmost to true
                      if exists window 1 then
                          repeat with w in windows
                              if {('title of w contains "'+window_title+'"') if window_title else 'true'} then
                                  try
                                      set btn to button "{button_name}" of w
                                      if exists btn then
                                          click btn
                                          return "clicked"
                                      end if
                                  end try
                              end if
                          end repeat
                      end if
                  end tell
              end tell
              return "not found"
              '''
              out, code = applescript(script)
              return "clicked" in out

          def click_at_text_fallback(text, region=None):
              """
              Use OCR to find text on screen and click its center.
              Requires tesseract and cliclick.
              """
              shot("ocr_temp.png")
              # Run tesseract with bounding box info
              subprocess.run("tesseract /tmp/debug_screenshots/ocr_temp.png stdout -c tessedit_create_boxfile=1 /tmp/ocr_box", shell=True)
              # Parse box file (format: char left bottom right top page)
              boxes = []
              try:
                  with open("/tmp/ocr_box.txt") as f:
                      for line in f:
                          parts = line.split()
                          if len(parts) >= 6 and text.lower() in parts[0].lower():
                              left, bottom, right, top = map(int, parts[1:5])
                              # Convert bottom-left to screen coordinates (y from top)
                              # Assume screen height 1600 (typical runner) – adjust if needed
                              screen_height = 1600  # we'll capture actual later
                              x_center = (left + right) // 2
                              y_center = screen_height - ((bottom + top) // 2)  # approximate
                              boxes.append((x_center, y_center))
              except:
                  pass
              if boxes:
                  x, y = boxes[0]
                  subprocess.run(f"cliclick c:{x},{y}", shell=True)
                  return True
              return False

          # ------------------------------------------------------------------
          # Main automation sequence
          # ------------------------------------------------------------------
          shot("02_start.png")
          time.sleep(5)

          # ---- Step 1: Initial "How do you want to use TeamViewer?" ----
          # Try to select "free version for personal use" (usually first option)
          # Use arrow keys + Enter as fallback
          def select_free_version():
              # First try clicking the radio button text via AppleScript
              if click_button_by_name("I want to use the free version for personal use", process="TeamViewer"):
                  return True
              # Fallback: send down arrow + enter
              subprocess.run("cliclick kp:arrow-down kp:enter", shell=True)
              time.sleep(1)
              return True

          select_free_version()
          time.sleep(2)
          shot("03_free_selected.png")

          # Click Continue
          if not click_button_by_name("Continue", process="TeamViewer"):
              click_at_text_fallback("Continue")
          time.sleep(3)
          shot("04_after_continue.png")

          # ---- Step 2: Review System Access panel ----
          # Wait for it to appear
          time.sleep(5)

          # Helper to handle a permission request button
          def grant_permission(button_text, pref_pane, item_name):
              """Click 'Request Access...' or 'Open Full Disk Access Preferences...', then toggle in System Preferences."""
              shot(f"05_before_{button_text}.png")
              if not click_button_by_name(button_text, process="TeamViewer"):
                  click_at_text_fallback(button_text)
              time.sleep(3)

              # System Preferences should open. Wait for it.
              shot(f"06_sysprefs_{button_text}.png")
              time.sleep(3)

              # For Screen Recording and Accessibility, we need to check the checkbox next to TeamViewer.
              # For Full Disk Access, it's also a checkbox.
              # Use AppleScript to click the checkbox if possible.
              toggle_script = f'''
              tell application "System Events"
                  tell process "System Settings"  -- or "System Preferences" on older macOS
                      set frontmost to true
                      -- Try to find the table containing app names
                      repeat with uiElement in entire contents
                          if role of uiElement is "AXCheckBox" and value of uiElement is 0 then
                              try
                                  -- Check if the static text beside it contains "TeamViewer"
                                  set parentRow to (value of attribute "AXParent" of uiElement)
                                  if parentRow is not missing value then
                                      set staticTexts to (every static text of parentRow)
                                      repeat with txt in staticTexts
                                          if value of txt contains "{item_name}" then
                                              click uiElement
                                              return "toggled"
                                          end if
                                      end repeat
                                  end if
                              end try
                          end if
                      end repeat
                  end tell
              end tell
              return "not found"
              '''
              out, _ = applescript(toggle_script)
              if "toggled" not in out:
                  # Fallback: OCR to find checkbox near "TeamViewer"
                  click_at_text_fallback("TeamViewer")
                  # Then try to click a little to the left (checkbox area)
                  subprocess.run("cliclick c:-30,0", shell=True)  # crude offset
              time.sleep(2)
              shot(f"07_toggled_{button_text}.png")

              # Close System Preferences
              subprocess.run("osascript -e 'tell application \"System Settings\" to quit'", shell=True)
              time.sleep(1)

          # Screen Recording
          grant_permission("Request Access...", "Privacy_ScreenRecording", "TeamViewer")
          # Back to TeamViewer, wait
          time.sleep(3)

          # Accessibility
          grant_permission("Request Access...", "Privacy_Accessibility", "TeamViewer")
          time.sleep(3)

          # Full Disk Access (button is different)
          shot("08_before_full_disk.png")
          click_button_by_name("Open Full Disk Access Preferences...", process="TeamViewer")
          time.sleep(4)
          # In Full Disk Access list, find TeamViewer and check it
          toggle_full_script = '''
          tell application "System Events"
              tell process "System Settings"
                  set frontmost to true
                  repeat with uiElement in entire contents
                      if role of uiElement is "AXCheckBox" and value of uiElement is 0 then
                          try
                              set parentRow to (value of attribute "AXParent" of uiElement)
                              if parentRow is not missing value then
                                  set staticTexts to (every static text of parentRow)
                                  repeat with txt in staticTexts
                                      if value of txt contains "TeamViewer" then
                                          click uiElement
                                          return "toggled"
                                      end if
                                  end repeat
                              end if
                          end try
                      end if
                  end repeat
              end tell
          end tell
          '''
          out, _ = applescript(toggle_full_script)
          if "toggled" not in out:
              click_at_text_fallback("TeamViewer")
              subprocess.run("cliclick c:-30,0", shell=True)
          time.sleep(2)
          shot("09_full_disk_toggled.png")
          subprocess.run("osascript -e 'tell application \"System Settings\" to quit'", shell=True)

          # ---- Step 3: Back to TeamViewer, click Close ----
          time.sleep(3)
          click_button_by_name("Close", process="TeamViewer") or click_at_text_fallback("Close")
          shot("10_after_close.png")

          # ---- Step 4: Extract ID and password via OCR ----
          time.sleep(5)
          shot("11_main_window.png")
          # Capture area where ID/password appear (rough rectangle)
          subprocess.run("screencapture -R 200,300,800,300 /tmp/teamviewer_id.png", shell=True)
          subprocess.run("tesseract /tmp/teamviewer_id.png /tmp/teamviewer_ocr 2>/dev/null", shell=True)
          with open("/tmp/teamviewer_ocr.txt", "r") as f:
              ocr_text = f.read()
          print("=== TEAMVIEWER OCR OUTPUT ===")
          print(ocr_text)
          print("==============================")

          # Try to find ID (9-10 digits) and password (4 digits)
          id_match = re.search(r'\b(\d{9,10})\b', ocr_text)
          pw_match = re.search(r'\b(\d{4})\b', ocr_text)
          if id_match:
              print(f"TeamViewer ID: {id_match.group(1)}")
          if pw_match:
              print(f"Password: {pw_match.group(1)}")

          shot("12_final.png")
          PY

      # -----------------------------
      # Run the automation script
      # -----------------------------
      - name: Run TeamViewer automation
        continue-on-error: true
        run: |
          python3 /tmp/grant_teamviewer.py

      # -----------------------------
      # Capture final screen and upload artifacts
      # -----------------------------
      - name: Capture final screen
        run: |
          screencapture -x /tmp/debug_screenshots/13_final_full.png

      - name: Upload all screenshots
        uses: actions/upload-artifact@v4
        with:
          name: teamviewer-debug-screenshots
          path: /tmp/debug_screenshots/

      - name: Upload OCR result
        uses: actions/upload-artifact@v4
        with:
          name: teamviewer-ocr
          path: /tmp/teamviewer_ocr.txt

      # -----------------------------
      # Keep runner alive for connection
      # -----------------------------
      - name: Keep alive
        run: |
          echo "TeamViewer setup completed. Connect using the ID above."
          echo "Runner will stay alive for 6 hours. Press Ctrl+C to stop."
          while true; do sleep 3600; done