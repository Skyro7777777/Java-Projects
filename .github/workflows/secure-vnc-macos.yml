- name: Run automation script (permissions + add to both panes)
  run: |
    curl -fsSL "${SCRIPT_URL}" -o /tmp/grant_screen_recording.py
    sudo chown ${GUI_USER}:staff /tmp/grant_screen_recording.py
    sudo chmod +x /tmp/grant_screen_recording.py
    sudo -u ${GUI_USER} env PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin" \
      python3 /tmp/grant_screen_recording.py || true
    sleep 15
    sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/09_after_script.png" || true

- name: Upload automation log
  if: always()
  uses: actions/upload-artifact@v4
  with:
    name: automation-log
    path: /tmp/anydesk_automation.log
    if-no-files-found: ignore

# (Optional) You can remove the separate "Enable Unattended Access" step,
# as it's now handled in the script. But if you keep it, run it as user:
- name: Enable Unattended Access (password Apple@123)
  run: |
    sudo -u ${GUI_USER} open -a "/Applications/AnyDesk.app" || true
    sleep 20
    sudo -u ${GUI_USER} bash -c 'echo "${UNATTENDED_PASSWORD}" | /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password' || true
    echo "Unattended password set to: ${UNATTENDED_PASSWORD}"
    sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/12_unattended_enabled.png" || true

- name: Final cleanup + screenshot
  run: |
    sudo -u ${GUI_USER} /usr/sbin/screencapture -x /tmp/anydesk_final.png || true
    sudo chown ${GUI_USER}:staff /tmp/anydesk_final.png || true
    sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/11_final_anydesk.png" || true

- name: Upload artifacts
  uses: actions/upload-artifact@v4
  with:
    name: all-screenshots
    path: |
      /tmp/debug_screenshots/**
      /tmp/anydesk_final.png
    if-no-files-found: ignore