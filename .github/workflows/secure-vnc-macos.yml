name: macOS GUI (Tailscale + NoMachine + VNC Fallback)
on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    steps:
      - name: Install and connect Tailscale
        run: |
          brew install tailscale
          sudo tailscaled --tun=userspace-networking &
          sleep 5
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-macos
          for i in {1..10}; do
            IP=$(sudo tailscale ip -4 2>/dev/null || true)
            if [ -n "$IP" ]; then
              echo "TAILSCALE_IP=$IP" >> $GITHUB_ENV
              echo "✅ Tailscale IP: $IP"
              break
            fi
            sleep 5
          done

      - name: Create user with known password
        run: |
          # Create vncuser with password Apple@123
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/bash
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID "510"
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "Apple@123"
          sudo dscl . -append /Groups/admin GroupMembership vncuser
          sudo createhomedir -c -u vncuser
          echo "✅ Created user: vncuser (password: Apple@123)"

      - name: Force macOS GUI session to start
        run: |
          # Bootstrap the Dock and Finder to initiate the graphical environment
          sudo -u vncuser launchctl bootstrap gui/$(id -u vncuser) /System/Library/LaunchAgents/com.apple.Dock.plist 2>/dev/null || true
          sudo -u vncuser open -a Finder 2>/dev/null || true
          sudo -u vncuser open /System/Library/CoreServices/Finder.app 2>/dev/null || true
          # Also try launching SystemUIServer for menu bar
          sudo -u vncuser open /System/Library/CoreServices/SystemUIServer.app 2>/dev/null || true
          sleep 10
          echo "✅ GUI session initiated"

      - name: Install and start NoMachine
        run: |
          brew install --cask nomachine
          # Correct path: NoMachine (not NXServer)
          sudo /Applications/NoMachine.app/Contents/MacOS/NoMachine &
          sleep 15
          # Also load launch daemon as fallback
          sudo launchctl load /Library/LaunchDaemons/com.nomachine.nxserver.plist 2>/dev/null || true
          sleep 5
          if sudo lsof -i :4000 > /dev/null; then
            echo "✅ NoMachine listening on port 4000"
          else
            echo "⚠️ NoMachine port not open, but continuing"
          fi

      - name: (Fallback) Install x11vnc + Xquartz for VNC if NoMachine fails
        run: |
          brew install --cask xquartz
          brew install x11vnc
          # Start Xquartz on display :1 as user vncuser
          sudo -u vncuser Xquartz :1 &
          sleep 10
          # Set VNC password
          mkdir -p /Users/vncuser/.vnc
          echo "Apple@12" | sudo -u vncuser x11vnc -storepasswd stdin /Users/vncuser/.vnc/passwd
          # Start x11vnc on port 5901
          sudo -u vncuser x11vnc -display :1 -forever -shared -rfbauth /Users/vncuser/.vnc/passwd -rfbport 5901 &
          sleep 5
          if sudo lsof -i :5901 > /dev/null; then
            echo "✅ x11vnc fallback running on port 5901 (password: Apple@12)"
          else
            echo "⚠️ x11vnc failed to start"
          fi

      - name: Display connection info and keep alive
        run: |
          echo "========================================================="
          echo "✅ SERVICES READY"
          echo "========================================================="
          echo "Tailscale IP: ${{ env.TAILSCALE_IP }}"
          echo ""
          echo "🔹 NoMachine:"
          echo "   Address: ${{ env.TAILSCALE_IP }}:4000"
          echo "   Username: vncuser"
          echo "   Password: Apple@123"
          echo ""
          echo "🔹 VNC (fallback via x11vnc):"
          echo "   Address: ${{ env.TAILSCALE_IP }}:5901"
          echo "   VNC Password: Apple@12"
          echo "   (This gives an X11 desktop, not macOS native)"
          echo ""
          echo "🔹 If you still get black screen:"
          echo "   - On Android NoMachine client, set connection quality to LAN"
          echo "   - Try enabling 'Virtual desktop' in client settings"
          echo "   - Use VNC client (like bVNC) for fallback"
          echo ""
          echo "⏳ Job will stay alive for 6 hours (GitHub limit)."
          echo "========================================================="
          while true; do sleep 3600; done
