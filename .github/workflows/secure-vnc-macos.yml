name: NoMachine macOS Remote Desktop (Tailscale)

on:
  workflow_dispatch:

jobs:
  mac:
    runs-on: macos-latest
    timeout-minutes: 420

    steps:

    - name: Install NoMachine
      run: |
        brew install --cask nomachine
        for i in {1..30}; do
          [ -f /usr/NX/bin/nxserver ] && break
          sleep 2
        done
        if [ ! -f /usr/NX/bin/nxserver ]; then
          echo "NoMachine install failed"
          exit 1
        fi
        sudo /usr/NX/bin/nxserver --virtualdesktop yes || true
        sudo /usr/NX/bin/nxserver --restart

    - name: Connect Tailscale
      uses: tailscale/github-action@v4
      with:
        authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
        statedir: /tmp/tailscale-state

    - name: Get Tailscale IP
      run: |
        TS_IP=$(tailscale ip -4)
        echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
        echo "Tailscale IP saved: $TS_IP"

    - name: Verify NoMachine port
      run: |
        echo "Checking connectivity to ${{ env.TAILSCALE_IP }}:4000"
        nc -z -w 5 "${{ env.TAILSCALE_IP }}" 4000 || exit 1
        echo "Port 4000 is open"

    - name: Keep session alive
      run: |
        echo "Connect using NoMachine NX to ${{ env.TAILSCALE_IP }}:4000"
        while true; do sleep 300; done
