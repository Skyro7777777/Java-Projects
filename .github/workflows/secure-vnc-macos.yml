name: Safari -> Google sign-in -> OCR 2FA -> open Chrome Remote Desktop

on:
  workflow_dispatch:

jobs:
  safari-crd:
    runs-on: macos-latest
    env:
      GUI_USER: vncuser
      GUI_PASS: Apple@123
      DEBUG_DIR: /tmp/debug_screenshots
      CRD_URL: "https://remotedesktop.google.com/access"
      GOOGLE_SIGNIN_URL: "https://accounts.google.com/signin/v2/identifier"
      # Paste only raw AppleScript if you want extra popup clear logic; not required here.

    steps:
      - name: Prepare debug folder
        run: |
          mkdir -p "${DEBUG_DIR}"
          chmod 777 "${DEBUG_DIR}"

      - name: Create GUI user (vncuser)
        run: |
          if ! id -u "${GUI_USER}" >/dev/null 2>&1; then
            sudo dscl . -create /Users/${GUI_USER}
            sudo dscl . -create /Users/${GUI_USER} UserShell /bin/bash
            sudo dscl . -create /Users/${GUI_USER} RealName "GUI User"
            sudo dscl . -create /Users/${GUI_USER} UniqueID 510
            sudo dscl . -create /Users/${GUI_USER} PrimaryGroupID 20
            sudo dscl . -create /Users/${GUI_USER} NFSHomeDirectory /Users/${GUI_USER}
            sudo dscl . -passwd /Users/${GUI_USER} "${GUI_PASS}"
            sudo dscl . -append /Groups/admin GroupMembership ${GUI_USER}
            sudo createhomedir -c -u ${GUI_USER} >/dev/null 2>&1 || true
          else
            echo "User exists"
          fi
          sudo chown -R ${GUI_USER}:staff "${DEBUG_DIR}" || true
          chmod -R 777 "${DEBUG_DIR}" || true

      - name: Install tesseract (OCR) and cliclick (optional)
        run: |
          brew install tesseract cliclick || true
          echo "TESSERACT=$(which tesseract)"

      - name: Launch Safari and navigate to Google sign-in
        run: |
          # make sure Safari is frontmost and open signin URL
          sudo -u ${GUI_USER} /usr/bin/osascript -e 'tell application "Safari" to activate'
          sudo -u ${GUI_USER} /usr/bin/osascript -e 'tell application "Safari" to open location "'"${GOOGLE_SIGNIN_URL}"'"'
          sleep 3
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/01_safari_open.png" || true

      - name: Fill email and press Next (AppleScript typing)
        env:
          EMAIL: ${{ secrets.GOOGLE_EMAIL }}
        run: |
          # Type email and press Return using System Events (as GUI user).
          # We use osascript and shell substitution to insert the secret email.
          sudo -u ${GUI_USER} /usr/bin/osascript <<'APPLESCRIPT'
          tell application "System Events"
            -- make sure Safari is frontmost
            tell application "Safari" to activate
            delay 0.5
            -- Focus the window
            try
              keystroke tab
            end try
            delay 0.5
          end tell
          APPLESCRIPT
          # Now type the email via osascript with the secret inserted (keystroke can't receive env from heredoc above)
          # Use a separate osascript call that the shell expands (this will not echo the secret to logs).
          sudo -u ${GUI_USER} /usr/bin/osascript -e 'tell application "System Events" to keystroke "'"${{ secrets.GOOGLE_EMAIL }}"'"' || true
          sleep 0.3
          sudo -u ${GUI_USER} /usr/bin/osascript -e 'tell application "System Events" to key code 36' || true
          sleep 3
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/02_after_email.png" || true

      - name: Fill password and sign in
        env:
          PASS: ${{ secrets.GOOGLE_PASS }}
        run: |
          # Wait for password field to appear, then type password and press return.
          # This uses keystroke (System Events). Adjust delays if needed.
          sleep 2
          sudo -u ${GUI_USER} /usr/bin/osascript -e 'tell application "System Events" to keystroke "'"${{ secrets.GOOGLE_PASS }}"'"' || true
          sleep 0.3
          sudo -u ${GUI_USER} /usr/bin/osascript -e 'tell application "System Events" to key code 36' || true
          sleep 5
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/03_after_password.png" || true

      - name: Wait for 2FA prompt and capture screenshot (OCR)
        run: |
          # Take repeated screenshots to catch the 3-number approval prompt if it appears.
          # We'll take a few screenshots over ~12s and then OCR the last captured image.
          for i in 1 2 3 4; do
            sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/04_2fa_capture_${i}.png" || true
            sleep 3
          done
          # Use the final screenshot for OCR
          IMG="${DEBUG_DIR}/04_2fa_capture_4.png"
          if [ -f "${IMG}" ]; then
            tesseract "${IMG}" /tmp/google_2fa_text || true
            echo "===== OCR OUTPUT (raw) ====="
            sed -n '1,200p' /tmp/google_2fa_text.txt || true
            echo "===== Extracted numbers (grep) ====="
            # extract groups of digits that look like the short 1-3 digit numbers Google shows
            grep -Eo '[0-9]{1,3}' /tmp/google_2fa_text.txt | tr '\n' ' ' || true
            # Save OCR output into debug folder for artifact
            cp /tmp/google_2fa_text.txt "${DEBUG_DIR}/google_2fa_text.txt" || true
          else
            echo "No image for OCR found."
          fi

      - name: Pause to let you tap the correct number on your phone
        run: |
          # Pause so you can look at the artifact/log (OCR output) and tap the correct number on phone.
          # The workflow sleeps for 120s; you can interrupt the run if needed from the Actions UI.
          echo "Pausing for 120 seconds for you to confirm the number on your phone."
          sleep 120
          echo "Continuing after pause."

      - name: Capture post-2FA screenshot
        run: |
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/05_post_2fa.png" || true

      - name: Open Chrome Remote Desktop page
        run: |
          sudo -u ${GUI_USER} /usr/bin/osascript -e 'tell application "Safari" to open location "'"${CRD_URL}"'"' || true
          sleep 5
          sudo -u ${GUI_USER} /usr/sbin/screencapture -x "${DEBUG_DIR}/06_crd_page.png" || true

      - name: Upload artifacts (screenshots + OCR text)
        uses: actions/upload-artifact@v4
        with:
          name: safari-crd-2fa-artifacts
          path: |
            /tmp/debug_screenshots/**
            /tmp/google_2fa_text.txt
          if-no-files-found: ignore