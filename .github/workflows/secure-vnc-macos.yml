name: macOS GUI (RustDesk - Blind Clicks Only)

on:
  workflow_dispatch:

jobs:
  gui:
    runs-on: macos-latest
    timeout-minutes: 420

    steps:
      - name: Install cliclick
        run: brew install cliclick

      - name: Install RustDesk
        run: |
          curl -L -o /tmp/rustdesk.dmg "https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.dmg"
          hdiutil attach /tmp/rustdesk.dmg -nobrowse -mountpoint /Volumes/RD
          cp -R "/Volumes/RD/RustDesk.app" /Applications/
          hdiutil detach "/Volumes/RD"

      - name: Launch RustDesk
        run: |
          open /Applications/RustDesk.app
          sleep 30

      - name: Click Configure (blind)
        run: |
          cliclick c:400,500
          sleep 5

      - name: Click Open System Settings (blind)
        run: |
          # LEFT button = Open System Settings (gray)
          cliclick c:280,450
          sleep 20

      - name: Click Switch (blind)
        run: |
          for y in 280 320 360 400; do
            cliclick c:720,$y
            sleep 1
          done
          sleep 5

      - name: Enter Password (blind)
        run: |
          osascript -e 'tell application "System Events" to keystroke "runner"'
          sleep 1
          osascript -e 'tell application "System Events" to keystroke return'
          sleep 5

      - name: Click Quit & Reopen (blind)
        run: |
          cliclick c:400,400
          sleep 20

      - name: Restart RustDesk
        run: |
          killall RustDesk 2>/dev/null || true
          sleep 3
          open /Applications/RustDesk.app
          sleep 30

      - name: FINAL Screenshot
        run: |
          osascript -e 'tell application "RustDesk" to activate'
          sleep 3
          # This will trigger ONE bash popup - that's OK
          screencapture /tmp/rustdesk.png

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-id
          path: /tmp/rustdesk.png

      - name: Done
        run: |
          echo "📸 Download 'rustdesk-id' artifact"
          while true; do sleep 3600; done
