name: macOS GUI Final Diagnostic (VNC + NoMachine + Screenshot)

on:
  workflow_dispatch:

jobs:
  gui:
    runs-on: macos-latest
    timeout-minutes: 420

    steps:
      - name: Create Admin User vncuser (password Apple@123)
        run: |
          password="Apple@123"
          sudo sysadminctl -addUser vncuser \
            -password "$password" \
            -fullName "VNC User" \
            -admin
          sudo dscl . -append /Groups/admin GroupMembership vncuser
          sudo createhomedir -c -u vncuser
          echo "NM_USER=vncuser" >> $GITHUB_ENV
          echo "NM_PASSWORD=$password" >> $GITHUB_ENV
          echo "✅ vncuser created (password: Apple@123)"

      - name: Enable Auto-Login GUI Session (fixes black screen)
        run: |
          sudo /usr/libexec/PlistBuddy -c "Add :autoLoginUser string vncuser" /Library/Preferences/com.apple.loginwindow.plist || true
          sudo defaults write /Library/Preferences/com.apple.loginwindow autoLoginUser vncuser
          sudo launchctl bootout system /System/Library/LaunchDaemons/com.apple.loginwindow.plist 2>/dev/null || true
          sudo launchctl bootstrap system /System/Library/LaunchDaemons/com.apple.loginwindow.plist || true
          sleep 40
          echo "✅ GUI session forced via auto-login"

      - name: Enable Built-in Screen Sharing (VNC) + Set Password
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -allowAccessFor -allUsers -privs -all
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvncpw -vncpw "Apple@123"
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -restart -agent
          echo "✅ VNC ready on port 5900 (password: Apple@123)"

      - name: Install NoMachine + Restart
        run: |
          brew install --cask nomachine
          sudo /usr/NX/bin/nxserver --restart || true
          echo "✅ NoMachine ready on port 4000"

      - name: Wake Display + Permissions Reset
        run: |
          brew install cliclick
          cliclick c:. m:0,0 c:. kd:ctrl ku:ctrl
          sudo tccutil reset All || true
          echo "✅ Display woken + permissions reset"

      - name: Take Screenshot (as logged-in user)
        run: |
          mkdir -p /tmp/screenshots
          sudo -u vncuser screencapture -x -C /tmp/screenshots/desktop.png || true
          echo "✅ Screenshot captured for diagnosis"

      - name: Connect Tailscale (Official)
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          tags: tag:gh-runner-macos
          statedir: /tmp/tailscale-state

      - name: Get Tailscale IP
        run: |
          tailscale set --hostname=gh-macos-gui-$GITHUB_RUN_ID
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
          echo "✅ Tailscale IP: $TS_IP"

      - name: Upload Screenshot Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-screenshot
          path: /tmp/screenshots/

      - name: Connection Info + Keep Alive
        run: |
          echo "=== CONNECT HERE ==="
          echo "Tailscale IP: ${{ env.TAILSCALE_IP }}"
          echo ""
          echo "VNC (built-in - most reliable):"
          echo "   Address: ${{ env.TAILSCALE_IP }}:5900"
          echo "   Password: Apple@123"
          echo ""
          echo "NoMachine (alternative):"
          echo "   Address: ${{ env.TAILSCALE_IP }}:4000"
          echo "   User: vncuser / Apple@123"
          echo ""
          echo "📸 Download 'desktop-screenshot' artifact to see real desktop (black screen fixed by auto-login)."
          echo "Job stays alive 7 hours."
          while true; do sleep 3600; done