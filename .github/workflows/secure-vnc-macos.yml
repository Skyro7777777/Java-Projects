name: macOS GUI (RustDesk Full Automation)
on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    steps:
      - name: Install Tailscale (optional)
        run: |
          brew install tailscale
          sudo tailscaled --tun=userspace-networking &
          sleep 5
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-macos-rustdesk || true
          for i in {1..5}; do
            IP=$(sudo tailscale ip -4 2>/dev/null || echo "unknown")
            if [ "$IP" != "unknown" ]; then
              echo "TAILSCALE_IP=$IP" >> $GITHUB_ENV
              break
            fi
            sleep 5
          done

      - name: Create user vncuser with password Apple@123
        run: |
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/bash
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID "510"
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "Apple@123"
          sudo dscl . -append /Groups/admin GroupMembership vncuser
          sudo createhomedir -c -u vncuser
          echo "✅ Created user: vncuser (password: Apple@123)"

      - name: Install dependencies
        run: |
          brew install tesseract cliclick

      - name: Download and Install RustDesk
        run: |
          curl -L -o /tmp/rustdesk.dmg "https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.dmg"
          hdiutil attach /tmp/rustdesk.dmg -nobrowse -mountpoint /Volumes/RustDesk
          cp -R "/Volumes/RustDesk/RustDesk.app" /Applications/
          hdiutil detach "/Volumes/RustDesk"
          echo "✅ RustDesk installed"

      - name: Reset Screen Recording permissions
        run: |
          sudo tccutil reset ScreenCapture
          echo "✅ Permissions reset - RustDesk will now request access."

      - name: Launch RustDesk
        run: |
          sudo -u vncuser open /Applications/RustDesk.app
          sleep 5

      # ----- FIXED STEP: Download and validate the permission script -----
      - name: Grant Screen Recording permission (with fallback)
        run: |
          # Try to download the AppleScript from URL
          curl -sL -o /tmp/grant_screen_recording.applescript \
            "https://raw.githubusercontent.com/Skyro7777777/Java-Projects/refs/heads/main/grant_screen_recording.applescript"
          
          # Debug: print first 5 lines and file size
          echo "=== Downloaded script first 5 lines ==="
          head -5 /tmp/grant_screen_recording.applescript
          echo "=== File size ==="
          wc -l /tmp/grant_screen_recording.applescript
          
          # Check if the file looks like AppleScript (contains "on run" or "property")
          if ! grep -q "on run" /tmp/grant_screen_recording.applescript; then
            echo "Downloaded file is not a valid AppleScript. Using inline fallback script."
            # Fallback: write the script directly (embedded here)
            cat > /tmp/grant_screen_recording.applescript <<'EOF'
-- grant_screen_recording.applescript (fallback)
-- Automates granting Screen Recording permission to RustDesk on macOS
property passwordStr : "Apple@123"
property timeoutSec : 30
property shortDelay : 1
property mediumDelay : 2
property longDelay : 5

-- Helper functions (same as before)
on waitForWindow(processName, windowText, maxWait)
    set startTime to current date
    repeat while (current date) - startTime < maxWait
        tell application "System Events"
            if exists (process processName) then
                tell process processName
                    if exists (first window whose title contains windowText) then return true
                end tell
            end if
        end tell
        delay 0.5
    end repeat
    return false
end waitForWindow

on clickButton(processName, windowTitle, buttonTitle, maxWait)
    set startTime to current date
    repeat while (current date) - startTime < maxWait
        tell application "System Events"
            if processName is not "" and not (exists process processName) then
                delay 0.5
            else
                tell process processName
                    if exists (first window whose title contains windowTitle) then
                        set targetWindow to first window whose title contains windowTitle
                        if exists (first button of targetWindow whose title contains buttonTitle) then
                            click (first button of targetWindow whose title contains buttonTitle)
                            return true
                        end if
                    end if
                end tell
            end if
        end tell
        delay 0.5
    end repeat
    return false
end clickButton

on clickUIElement(processName, elementDesc, elementType, instance)
    tell application "System Events"
        tell process processName
            set uiElements to UI elements whose description contains elementDesc
            if (count uiElements) > 0 then
                click item instance of uiElements
                return true
            end if
        end tell
    end tell
    return false
end clickUIElement

-- Main routine
on run
    try
        -- Step 1: Wait for RustDesk main window and click "Configure"
        log "Waiting for RustDesk main window..."
        if not waitForWindow("RustDesk", "RustDesk", timeoutSec) then
            error "RustDesk main window not found"
        end if
        
        tell application "System Events"
            tell process "RustDesk"
                set frontmost to true
                delay shortDelay
                if exists (first button whose title is "Configure") then
                    click (first button whose title is "Configure")
                    log "Clicked Configure button"
                else
                    do shell script "sudo -u vncuser cliclick c:200,300"
                    log "Fallback: cliclick at (200,300)"
                end if
            end tell
        end tell
        
        -- Step 2: Wait for permission dialog and click "Open System Settings"
        delay longDelay
        log "Waiting for Screen Recording permission dialog..."
        if clickButton("System Events", "Screen Recording", "Open System Settings", timeoutSec) then
            log "Clicked Open System Settings"
        else
            do shell script "sudo -u vncuser cliclick c:512,384"
            delay mediumDelay
        end if
        
        -- Step 3: Wait for System Settings to open
        delay longDelay
        log "Waiting for System Settings to open..."
        if not waitForWindow("System Settings", "Screen Recording", timeoutSec) then
            do shell script "open 'x-apple.systempreferences:com.apple.preference.security?Privacy_ScreenRecording'"
            delay longDelay
        end if
        
        tell application "System Events"
            tell process "System Settings"
                set frontmost to true
                delay mediumDelay
                
                -- Unlock if necessary
                try
                    set lockButton to first button whose description contains "lock"
                    if exists lockButton then
                        click lockButton
                        delay mediumDelay
                        keystroke passwordStr
                        delay shortDelay
                        keystroke return
                        delay longDelay
                        log "Unlocked settings"
                    end if
                end try
                
                -- Enable RustDesk switch
                set found to false
                try
                    set mainTable to table 1 of scroll area 1 of window 1
                    repeat with aRow in (every row of mainTable)
                        try
                            if value of static text 1 of aRow is "RustDesk" then
                                click checkbox 1 of aRow
                                set found to true
                                log "Enabled RustDesk in Screen Recording list"
                                exit repeat
                            end if
                        end on error
                    end repeat
                on error errMsg
                    log "Error finding table: " & errMsg
                end try
                
                if not found then
                    do shell script "sudo -u vncuser cliclick c:700,300"
                    log "Fallback: cliclick at (700,300) to toggle switch"
                end if
            end tell
        end tell
        
        -- Step 6: Handle password prompt if appears
        delay longDelay
        log "Checking for password confirmation dialog..."
        tell application "System Events"
            set pwDialogFound to false
            repeat with proc in {"System Settings", "SecurityAgent"}
                if exists (process proc) then
                    tell process proc
                        if exists (first window whose title contains "Privacy & Security" and description contains "password") then
                            set pwWindow to first window whose title contains "Privacy & Security"
                            set frontmost to true
                            keystroke passwordStr
                            delay shortDelay
                            try
                                click (first button of pwWindow whose title is "Modify Settings")
                            on error
                                keystroke return
                            end try
                            set pwDialogFound to true
                            log "Entered password and confirmed"
                            exit repeat
                        end if
                    end tell
                end if
            end repeat
            if not pwDialogFound then
                log "No password prompt appeared (might have been already unlocked)"
            end if
        end tell
        
        -- Step 7: Handle "Quit & Reopen" dialog
        delay longDelay
        log "Waiting for RustDesk restart dialog..."
        if clickButton("RustDesk", "RustDesk", "Quit", 15) then
            log "Clicked Quit to restart RustDesk"
        else
            tell application "System Events"
                tell process "RustDesk"
                    try
                        set quitButton to first button whose title contains "Quit"
                        click quitButton
                        log "Fallback: clicked Quit button"
                    end try
                end tell
            end tell
        end if
        
        -- Step 8: Wait for RustDesk restart
        delay longDelay * 2
        log "Waiting for RustDesk to restart..."
        if waitForWindow("RustDesk", "RustDesk", timeoutSec) then
            tell application "System Events" to tell process "RustDesk" to set frontmost to true
            log "RustDesk restarted successfully"
        else
            error "RustDesk did not restart"
        end if
        
        -- Step 9: Take screenshot
        delay mediumDelay
        do shell script "sudo -u vncuser screencapture -x /tmp/rustdesk_screen_final.png"
        log "Screenshot saved to /tmp/rustdesk_screen_final.png"
        
        return "Screen Recording permission granted successfully."
        
    on error errMsg
        log "Error: " & errMsg
        return "Failed: " & errMsg
    end try
end run
EOF
          fi
          
          # Run the script (whether downloaded or fallback)
          sudo -u vncuser osascript /tmp/grant_screen_recording.applescript
          
          echo "✅ Permission automation completed."

      - name: Extract ID and password from screenshot
        run: |
          cd /tmp
          if [ -f rustdesk_screen_final.png ]; then
            tesseract rustdesk_screen_final.png stdout -l eng 2>/dev/null > rustdesk_text.txt
          else
            tesseract rustdesk_screen.png stdout -l eng 2>/dev/null > rustdesk_text.txt
          fi
          
          echo "=== RUSTDESK CREDENTIALS ==="
          RUSTDESK_ID=$(grep -Eo '[0-9]{9}' rustdesk_text.txt | head -1)
          RUSTDESK_PASS=$(grep -Eo '[A-Za-z0-9]{6,8}' rustdesk_text.txt | tail -1)
          
          if [ -n "$RUSTDESK_ID" ]; then
            echo "✅ RustDesk ID: $RUSTDESK_ID"
          else
            echo "❌ Could not extract ID. Full OCR text:"
            cat rustdesk_text.txt
          fi
          
          if [ -n "$RUSTDESK_PASS" ]; then
            echo "✅ Password: $RUSTDESK_PASS"
          else
            echo "❌ Could not extract password. Full OCR text:"
            cat rustdesk_text.txt
          fi
          
          echo "RUSTDESK_ID=$RUSTDESK_ID" >> $GITHUB_ENV
          echo "RUSTDESK_PASS=$RUSTDESK_PASS" >> $GITHUB_ENV

      - name: Upload screenshot for manual verification
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-screenshot
          path: |
            /tmp/rustdesk_screen_final.png
            /tmp/rustdesk_screen.png
          if-no-files-found: ignore

      - name: Keep alive and show connection info
        run: |
          echo "========================================================="
          echo "✅ RUSTDESK READY"
          echo "========================================================="
          echo "RustDesk ID: ${{ env.RUSTDESK_ID }}"
          echo "Password:    ${{ env.RUSTDESK_PASS }}"
          echo ""
          echo "📱 ANDROID CONNECTION:"
          echo "   1. Install 'RustDesk' from Google Play Store"
          echo "   2. Enter the ID above"
          echo "   3. When prompted, enter the password"
          echo "   4. You will see the macOS desktop!"
          echo ""
          echo "🌐 Tailscale IP (if needed): ${{ env.TAILSCALE_IP }}"
          echo ""
          echo "⏳ Job will stay alive for 6 hours. If OCR failed, download the screenshot artifact."
          echo "========================================================="
          while true; do sleep 3600; done