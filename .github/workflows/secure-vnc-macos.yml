name: macOS GUI (Tailscale + NoMachine)
on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    steps:
      - name: Install Tailscale
        run: |
          brew install tailscale
          sudo tailscaled --tun=userspace-networking &
          sleep 5
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-macos
          for i in {1..10}; do
            IP=$(sudo tailscale ip -4 2>/dev/null || true)
            if [ -n "$IP" ]; then
              echo "TAILSCALE_IP=$IP" >> $GITHUB_ENV
              echo "✅ Tailscale IP: $IP"
              break
            fi
            sleep 5
          done

      - name: Install and start NoMachine
        run: |
          brew install --cask nomachine
          sudo /Applications/NoMachine.app/Contents/MacOS/NXServer &
          sleep 15

      - name: Display connection info
        run: |
          echo "=========================================="
          echo "✅ NoMachine server running on port 4000"
          echo "🌐 Connect using NoMachine client to ${{ env.TAILSCALE_IP }}:4000"
          echo "👤 Username: runner (no password by default)"
          echo "⏳ Job will stay alive for up to 6 hours"
          echo "=========================================="
          while true; do sleep 3600; done
