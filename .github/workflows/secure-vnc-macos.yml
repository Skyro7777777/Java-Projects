name: macOS GUI (Tailscale + VNC)
on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    steps:
      - name: Install and connect Tailscale
        run: |
          brew install tailscale
          sudo tailscaled --tun=userspace-networking &
          sleep 5
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-macos
          # Wait for IP and save it
          for i in {1..10}; do
            IP=$(sudo tailscale ip -4 2>/dev/null || true)
            if [ -n "$IP" ]; then
              echo "TAILSCALE_IP=$IP" >> $GITHUB_ENV
              echo "✅ Tailscale IP: $IP"
              break
            fi
            sleep 5
          done

      - name: Create new admin user with known password
        run: |
          # Create a new user called 'vncuser' with password 'Apple@123'
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/bash
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID "510"
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "Apple@123"
          sudo dscl . -append /Groups/admin GroupMembership vncuser
          
          # Create home directory
          sudo createhomedir -c -u vncuser
          
          echo "✅ Created user: vncuser with password: Apple@123"

      - name: Enable Screen Sharing (VNC)
        run: |
          # Enable Screen Sharing daemon
          sudo defaults write /var/db/launchd.db/com.apple.launchd/overrides.plist com.apple.screensharing -dict Disabled -bool false
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist

          # Set VNC password (must be ≤8 chars)
          VNC_PASS="Apple@12"
          
          # Configure VNC for all users and set password
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -users vncuser \
            -privs -all \
            -setVNCPassword -vncpasswd "$VNC_PASS" \
            -restart -agent

          # Restart the service
          sudo launchctl unload /System/Library/LaunchDaemons/com.apple.screensharing.plist
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
          
          sleep 5
          echo "✅ VNC server configured"

      - name: Force a graphical session
        run: |
          # Create a login window session by launching Terminal as the new user
          sudo -u vncuser open -a Terminal.app &
          sleep 10
          echo "✅ Graphical session initiated"

      - name: Display connection info and keep alive
        run: |
          echo "=========================================="
          echo "✅ VNC server is running on port 5900"
          echo "🌐 Connect using: vnc://${{ env.TAILSCALE_IP }}:5900"
          echo "=========================================="
          echo "LOGIN CREDENTIALS:"
          echo "   Username: vncuser"
          echo "   Password: Apple@123"
          echo "=========================================="
          echo "VNC PASSWORD (for the connection): Apple@12"
          echo "=========================================="
          echo "⏳ Job will stay alive for up to 6 hours"
          echo "Press Ctrl+C to stop early"
          
          # Keep the job alive
          while true; do
            sleep 3600
          done
