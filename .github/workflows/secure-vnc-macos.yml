name: macOS GUI (RustDesk with Reliable Clicks)
on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    steps:
      - name: Install Tailscale (optional)
        run: |
          brew install tailscale
          sudo tailscaled --tun=userspace-networking &
          sleep 5
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-macos-rustdesk || true
          for i in {1..5}; do
            IP=$(sudo tailscale ip -4 2>/dev/null || echo "unknown")
            if [ "$IP" != "unknown" ]; then
              echo "TAILSCALE_IP=$IP" >> $GITHUB_ENV
              break
            fi
            sleep 5
          done

      - name: Create user vncuser with password Apple@123
        run: |
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/bash
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID "510"
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "Apple@123"
          sudo dscl . -append /Groups/admin GroupMembership vncuser
          sudo createhomedir -c -u vncuser
          echo "✅ Created user: vncuser (password: Apple@123)"

      - name: Install dependencies
        run: |
          brew install tesseract cliclick

      - name: Download and Install RustDesk
        run: |
          curl -L -o /tmp/rustdesk.dmg "https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.dmg"
          hdiutil attach /tmp/rustdesk.dmg -nobrowse -mountpoint /Volumes/RustDesk
          cp -R "/Volumes/RustDesk/RustDesk.app" /Applications/
          hdiutil detach "/Volumes/RustDesk"
          echo "✅ RustDesk installed"

      - name: Reset Screen Recording permissions
        run: |
          sudo tccutil reset ScreenCapture
          echo "✅ Permissions reset - RustDesk will now request access."

      - name: Launch RustDesk
        run: |
          sudo -u vncuser open /Applications/RustDesk.app
          sleep 5

      # --- Step 1: Click "Open System Settings" in the permission dialog ---
      - name: Click "Open System Settings"
        run: |
          # Wait for dialog to appear (look for window with "Screen Recording" title)
          for i in {1..20}; do
            if sudo -u vncuser osascript -e 'tell app "System Events" to exists (first window whose title contains "Screen Recording")' 2>/dev/null; then
              echo "Dialog found"
              break
            fi
            sleep 1
          done
          # Click at approximate center of the dialog's button (assuming 1024x768 screen)
          # Coordinates: x=512, y=384 (center) then adjust downward for button
          sudo -u vncuser cliclick c:512,400
          sleep 5

      # --- Step 2: Open Screen Recording pane directly (ensures we are in the right place) ---
      - name: Open Screen Recording preferences
        run: |
          sudo -u vncuser open "x-apple.systempreferences:com.apple.preference.security?Privacy_ScreenRecording"
          sleep 5

      # --- Step 3: Click the lock to enable changes ---
      - name: Click lock and enter password
        run: |
          # Click lock icon (usually bottom-left, coordinates approx 100, 650 for 1024x768)
          sudo -u vncuser cliclick c:100,650
          sleep 2
          # Type password using AppleScript (more reliable than cliclick for text)
          sudo -u vncuser osascript -e 'tell application "System Events" to keystroke "Apple@123"' -e 'delay 1' -e 'keystroke return'
          sleep 3

      # --- Step 4: Find and click the checkbox next to RustDesk ---
      - name: Enable RustDesk in Screen Recording list
        run: |
          # Take a screenshot to locate the checkbox position
          sudo -u vncuser screencapture -x /tmp/sr_screen.png
          # Use OCR to find "RustDesk" text and get its bounding box
          cd /tmp
          tesseract sr_screen.png stdout -l eng tsv 2>/dev/null > ocr.tsv
          # Find line with "RustDesk"
          RUSTDESK_LINE=$(grep "RustDesk" ocr.tsv | head -1)
          if [ -n "$RUSTDESK_LINE" ]; then
            LEFT=$(echo "$RUSTDESK_LINE" | awk '{print $7}')
            TOP=$(echo "$RUSTDESK_LINE" | awk '{print $8}')
            RIGHT=$(echo "$RUSTDESK_LINE" | awk '{print $9}')
            BOTTOM=$(echo "$RUSTDESK_LINE" | awk '{print $10}')
            # Checkbox is to the left of the text; estimate x as LEFT - 30, y as midpoint
            CHECK_X=$((LEFT - 30))
            CHECK_Y=$(( (TOP + BOTTOM) / 2 ))
            echo "Clicking checkbox at ($CHECK_X, $CHECK_Y)"
            sudo -u vncuser cliclick c:$CHECK_X,$CHECK_Y
          else
            # Fallback: click at approximate position (right side of window, mid-height)
            echo "RustDesk text not found, using fallback coordinates"
            sudo -u vncuser cliclick c:700,300
          fi
          sleep 3

      # --- Step 5: Handle "Quit & Reopen" dialog if it appears ---
      - name: Click "Quit & Reopen"
        run: |
          for i in {1..10}; do
            if sudo -u vncuser osascript -e 'tell app "System Events" to exists (first window whose title contains "RustDesk" and description contains "quit")' 2>/dev/null; then
              echo "Quit dialog found"
              sudo -u vncuser cliclick c:512,400  # Click approximate center of button
              break
            fi
            sleep 2
          done
          sleep 10

      # --- Step 6: Now RustDesk should have permission; capture its main window ---
      - name: Capture RustDesk main window
        run: |
          # Bring RustDesk to front
          sudo -u vncuser osascript -e 'tell application "System Events" to tell process "RustDesk" to set frontmost to true' 2>/dev/null || true
          sleep 5
          sudo -u vncuser screencapture -x /tmp/rustdesk_screen.png
          echo "✅ Screenshot captured"

      - name: Extract ID and password from screenshot
        run: |
          cd /tmp
          tesseract rustdesk_screen.png stdout -l eng 2>/dev/null > rustdesk_text.txt
          echo "=== RUSTDESK CREDENTIALS ==="
          RUSTDESK_ID=$(grep -Eo '[0-9]{9}' rustdesk_text.txt | head -1)
          RUSTDESK_PASS=$(grep -Eo '[A-Za-z0-9]{6,8}' rustdesk_text.txt | tail -1)
          if [ -n "$RUSTDESK_ID" ]; then
            echo "✅ RustDesk ID: $RUSTDESK_ID"
          else
            echo "❌ Could not extract ID. Full OCR text:"
            cat rustdesk_text.txt
          fi
          if [ -n "$RUSTDESK_PASS" ]; then
            echo "✅ Password: $RUSTDESK_PASS"
          else
            echo "❌ Could not extract password. Full OCR text:"
            cat rustdesk_text.txt
          fi
          echo "RUSTDESK_ID=$RUSTDESK_ID" >> $GITHUB_ENV
          echo "RUSTDESK_PASS=$RUSTDESK_PASS" >> $GITHUB_ENV

      - name: Upload screenshot for manual verification
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-screenshot
          path: /tmp/rustdesk_screen.png
          if-no-files-found: ignore

      - name: Keep alive and show connection info
        run: |
          echo "========================================================="
          echo "✅ RUSTDESK READY"
          echo "========================================================="
          echo "RustDesk ID: ${{ env.RUSTDESK_ID }}"
          echo "Password:    ${{ env.RUSTDESK_PASS }}"
          echo ""
          echo "📱 ANDROID CONNECTION:"
          echo "   1. Install 'RustDesk' from Google Play Store"
          echo "   2. Enter the ID above"
          echo "   3. When prompted, enter the password"
          echo "   4. You will see the macOS desktop!"
          echo ""
          echo "🌐 Tailscale IP (if needed): ${{ env.TAILSCALE_IP }}"
          echo ""
          echo "⏳ Job will stay alive for 6 hours. If OCR failed, download the screenshot artifact."
          echo "========================================================="
          while true; do sleep 3600; done