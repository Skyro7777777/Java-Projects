name: macOS GUI (Tailscale + NoMachine)
on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    steps:
      - name: Install Tailscale
        run: |
          brew install tailscale
          sudo tailscaled --tun=userspace-networking &
          sleep 5
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-macos
          for i in {1..10}; do
            IP=$(sudo tailscale ip -4 2>/dev/null || true)
            if [ -n "$IP" ]; then
              echo "TAILSCALE_IP=$IP" >> $GITHUB_ENV
              break
            fi
            sleep 5
          done

      - name: Create user with known password
        run: |
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/bash
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID "510"
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "Apple@123"
          sudo dscl . -append /Groups/admin GroupMembership vncuser
          sudo createhomedir -c -u vncuser

      - name: Force a full GUI session for vncuser
        run: |
          # Bootstrap the user's graphical session
          sudo -u vncuser launchctl bootstrap gui/$(id -u vncuser) /System/Library/LaunchAgents/com.apple.Dock.plist 2>/dev/null || true
          sudo -u vncuser open -a Finder 2>/dev/null || true
          sudo -u vncuser open /System/Library/CoreServices/SystemUIServer.app 2>/dev/null || true
          # Also launch the login window (in case the user isn't auto-logged in)
          sudo -u vncuser /System/Library/CoreServices/Menu\ Extras/User.menu/Contents/Resources/CGSession -suspend 2>/dev/null || true
          sleep 15
          echo "✅ GUI session should be active"

      - name: Install and start NoMachine
        run: |
          brew install --cask nomachine
          sudo launchctl load /Library/LaunchDaemons/com.nomachine.nxserver.plist
          sleep 15
          if sudo lsof -i :4000 > /dev/null; then
            echo "✅ NoMachine listening on port 4000"
          else
            echo "❌ NoMachine failed to start"
            exit 1
          fi

      - name: Display connection info and keep alive
        run: |
          echo "========================================================="
          echo "✅ NoMachine is ready on port 4000"
          echo "Tailscale IP: ${{ env.TAILSCALE_IP }}"
          echo ""
          echo "🔹 Connect from your Android device:"
          echo "   - Open NoMachine app, create new connection to ${{ env.TAILSCALE_IP }}:4000"
          echo "   - Username: vncuser"
          echo "   - Password: Apple@123"
          echo ""
          echo "📱 Android Client Settings (critical):"
          echo "   • Go to connection settings → Display → Enable 'Virtual desktop'"
          echo "   • Set 'Connection quality' to LAN or Good quality"
          echo "   • Try different codecs: under Advanced → Encoder, select 'JPEG' or 'VP8'"
          echo "   • If still black, tap the screen and try sending a key (e.g., Ctrl+Alt+Del) to wake the session"
          echo ""
          echo "💻 If you have a desktop client, test with that first to confirm NoMachine works."
          echo ""
          echo "⏳ Job will stay alive for 6 hours."
          echo "========================================================="
          while true; do sleep 3600; done