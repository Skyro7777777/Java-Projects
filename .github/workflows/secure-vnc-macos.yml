name: macOS GUI (RustDesk - Improved Apple Automation)

on:
  workflow_dispatch:

jobs:
  gui:
    runs-on: macos-latest
    timeout-minutes: 420

    steps:
      - name: Create user vncuser
        run: |
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/bash
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID "510"
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "Apple@123"
          sudo dscl . -append /Groups/admin GroupMembership vncuser
          sudo createhomedir -c -u vncuser
          echo "✅ Created user: vncuser (password: Apple@123)"

      - name: Install dependencies
        run: |
          brew install tesseract cliclick

      - name: Download and Install RustDesk
        run: |
          curl -L -o /tmp/rustdesk.dmg "https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.dmg"
          hdiutil attach /tmp/rustdesk.dmg -nobrowse -mountpoint /Volumes/RustDesk
          cp -R "/Volumes/RustDesk/RustDesk.app" /Applications/
          hdiutil detach "/Volumes/RustDesk"
          echo "✅ RustDesk installed"

      - name: Launch RustDesk
        run: |
          sudo -u vncuser open /Applications/RustDesk.app
          echo "Waiting for RustDesk to initialize..."
          sleep 15

      # === IMPROVED: Use AppleScript to find and click Configure button ===
      - name: Click Configure Button (Smart Detection)
        run: |
          sudo -u vncuser osascript <<'APPLESCRIPT'
            set maxAttempts to 10
            
            repeat with attempt from 1 to maxAttempts
              tell application "System Events"
                set frontmost of process "RustDesk" to true
                delay 1
                
                tell process "RustDesk"
                  -- Get all windows
                  set allWindows to every window
                  
                  repeat with win in allWindows
                    try
                      -- Look for "Configure" button by checking all UI elements
                      set allButtons to every button of win
                      repeat with btn in allButtons
                        set btnTitle to name of btn
                        if btnTitle contains "Configure" or btnTitle contains "configure" then
                          click btn
                          return "Clicked Configure button"
                        end if
                      end repeat
                      
                      -- Also check for clickable areas that might be the configure button
                      set allGroups to every group of win
                      repeat with grp in allGroups
                        try
                          set grpDesc to description of grp
                          if grpDesc contains "Configure" then
                            click grp
                            return "Clicked Configure group"
                          end if
                        end try
                      end repeat
                      
                    end try
                  end repeat
                end tell
              end tell
              
              delay 2
            end repeat
            
            -- Fallback: Click at known position based on macOS window layout
            tell application "System Events"
              tell process "RustDesk"
                set winPos to position of window 1
                set winSize to size of window 1
                -- Configure button is typically in the center-bottom of the window
                set clickX to (item 1 of winPos) + (item 1 of winSize) / 2
                set clickY to (item 2 of winPos) + (item 2 of winSize) - 100
              end tell
            end tell
            do shell script "sudo -u vncuser cliclick c:" & (clickX as integer) & "," & (clickY as integer)
          APPLESCRIPT
          
          echo "✅ Attempted to click Configure"
          sleep 5

      # === IMPROVED: Detect and handle permission dialog ===
      - name: Handle Screen Recording Permission Dialog
        run: |
          sudo -u vncuser osascript <<'APPLESCRIPT'
            set userPassword to "Apple@123"
            
            tell application "System Events"
              -- Wait for permission dialog
              delay 3
              
              -- Check for SecurityAgent process (handles permission dialogs)
              if exists process "SecurityAgent" then
                tell process "SecurityAgent"
                  set frontmost to true
                  delay 1
                  
                  -- Look for "Open System Settings" or similar button
                  try
                    set allWindows to every window
                    repeat with win in allWindows
                      -- Get all buttons in the dialog
                      set allButtons to every button of win
                      repeat with btn in allButtons
                        set btnTitle to name of btn
                        if btnTitle contains "Open" or btnTitle contains "Settings" or btnTitle contains "System" then
                          click btn
                          return "Clicked Open System Settings"
                        end if
                      end repeat
                    end repeat
                  end try
                end tell
              end if
              
              -- Fallback: Direct open System Settings
              do shell script "open 'x-apple.systempreferences:com.apple.preference.security?Privacy_ScreenRecording'"
            end tell
          APPLESCRIPT
          
          echo "✅ Permission dialog handled"
          sleep 5

      # === IMPROVED: Navigate and enable in System Settings ===
      - name: Enable RustDesk Screen Recording Permission
        run: |
          sudo -u vncuser osascript <<'APPLESCRIPT'
            set userPassword to "Apple@123"
            
            tell application "System Events"
              tell process "System Settings"
                set frontmost to true
                delay 3
                
                -- macOS Ventura/Sonoma has a different UI structure
                -- The main content is typically in a group/scroll area
                
                try
                  -- Method 1: Find RustDesk in the list by searching
                  set mainWindow to window 1
                  
                  -- Look through all scroll areas (list container)
                  set allScrollAreas to every scroll area of mainWindow
                  
                  repeat with scrollArea in allScrollAreas
                    try
                      -- Check for tables (the app list is usually a table)
                      set allTables to every table of scrollArea
                      repeat with tbl in allTables
                        set allRows to every row of tbl
                        repeat with row in allRows
                          try
                            -- Check if this row contains "RustDesk"
                            set rowText to value of static text 1 of row
                            if rowText contains "RustDesk" then
                              -- Found it! Click the checkbox/switch
                              try
                                click checkbox 1 of row
                                return "Enabled RustDesk via checkbox"
                              on error
                                try
                                  click switch 1 of row
                                  return "Enabled RustDesk via switch"
                                end try
                              end try
                            end if
                          end try
                        end repeat
                      end repeat
                    end try
                  end repeat
                  
                on error errMsg
                  -- Method 2: Use keyboard navigation
                  -- Press Cmd+F to search if available
                  keystroke "f" using {command down}
                  delay 1
                  keystroke "RustDesk"
                  delay 2
                  keystroke return
                  delay 2
                  -- Tab to the checkbox and toggle it
                  keystroke tab
                  delay 0.5
                  keystroke space
                end try
              end tell
              
              -- Handle password prompt for admin action
              delay 2
              if exists process "SecurityAgent" then
                tell process "SecurityAgent"
                  try
                    set frontmost to true
                    delay 1
                    -- Enter password
                    keystroke userPassword
                    delay 0.5
                    keystroke return
                  end try
                end tell
              end if
            end tell
          APPLESCRIPT
          
          echo "✅ Attempted to enable RustDesk permission"
          sleep 3

      # === IMPROVED: Handle Quit & Reopen dialog ===
      - name: Handle Quit & Reopen Dialog
        run: |
          sudo -u vncuser osascript <<'APPLESCRIPT'
            tell application "System Events"
              delay 2
              
              -- Check for SecurityAgent (quit dialog)
              if exists process "SecurityAgent" then
                tell process "SecurityAgent"
                  set frontmost to true
                  delay 1
                  
                  try
                    set allWindows to every window
                    repeat with win in allWindows
                      -- Look for Quit & Reopen button
                      set allButtons to every button of win
                      repeat with btn in allButtons
                        set btnTitle to name of btn
                        if btnTitle contains "Quit" or btnTitle contains "Reopen" then
                          click btn
                          return "Clicked Quit & Reopen"
                        end if
                      end repeat
                    end repeat
                  end try
                end tell
              end if
              
              -- Also check if RustDesk itself has a dialog
              if exists process "RustDesk" then
                tell process "RustDesk"
                  try
                    set allButtons to every button of window 1
                    repeat with btn in allButtons
                      set btnTitle to name of btn
                      if btnTitle contains "Quit" or btnTitle contains "Restart" then
                        click btn
                        return "Clicked Quit/Restart in RustDesk"
                      end if
                    end repeat
                  end try
                end tell
              end if
            end tell
          APPLESCRIPT
          
          echo "✅ Handled Quit & Reopen"
          sleep 15

      # === Relaunch RustDesk after permission grant ===
      - name: Relaunch RustDesk
        run: |
          sudo -u vncuser killall RustDesk 2>/dev/null || true
          sleep 2
          sudo -u vncuser open /Applications/RustDesk.app
          echo "Waiting for RustDesk to start with permissions..."
          sleep 20

      - name: Extract RustDesk Credentials
        run: |
          sudo -u vncuser osascript -e 'tell application "System Events" to tell process "RustDesk" to set frontmost to true'
          sleep 3
          
          # Take screenshot
          sudo -u vncuser screencapture -x /tmp/rustdesk_screen.png
          
          # OCR extract
          cd /tmp
          tesseract rustdesk_screen.png stdout -l eng 2>/dev/null > rustdesk_text.txt
          
          echo "=== OCR Output ==="
          cat rustdesk_text.txt
          echo "=================="
          
          # Extract ID (9 digits)
          RUSTDESK_ID=$(grep -Eo '[0-9]{9}' rustdesk_text.txt | head -1)
          # Extract Password (alphanumeric, typically 6 chars)
          RUSTDESK_PASS=$(grep -Eo '[A-Za-z0-9]{6}' rustdesk_text.txt | tail -1)
          
          echo "RUSTDESK_ID=$RUSTDESK_ID" >> $GITHUB_ENV
          echo "RUSTDESK_PASS=$RUSTDESK_PASS" >> $GITHUB_ENV
          
          if [ -n "$RUSTDESK_ID" ]; then
            echo "✅ RustDesk ID: $RUSTDESK_ID"
          else
            echo "⚠️ Could not extract ID automatically"
          fi
          
          if [ -n "$RUSTDESK_PASS" ]; then
            echo "✅ Password: $RUSTDESK_PASS"
          else
            echo "⚠️ Could not extract password automatically"
          fi

      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-screenshot
          path: /tmp/rustdesk_screen.png
          if-no-files-found: ignore

      - name: Display Connection Info
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║                    RUSTDESK CONNECTION INFO                  ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  RustDesk ID:  ${{ env.RUSTDESK_ID }}                                "
          echo "║  Password:     ${{ env.RUSTDESK_PASS }}                              "
          echo "║                                                              ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  📱 ANDROID CONNECTION STEPS:                                ║"
          echo "║                                                              ║"
          echo "║  1. Install 'RustDesk' from Google Play Store                ║"
          echo "║     (No Tailscale needed - RustDesk works directly!)         ║"
          echo "║                                                              ║"
          echo "║  2. Open RustDesk app                                        ║"
          echo "║                                                              ║"
          echo "║  3. Enter the ID above in 'Remote ID' field                  ║"
          echo "║                                                              ║"
          echo "║  4. Tap Connect                                              ║"
          echo "║                                                              ║"
          echo "║  5. When prompted, enter the password above                  ║"
          echo "║                                                              ║"
          echo "║  6. You should see the macOS GUI desktop! 🎉                 ║"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "💡 If OCR failed, download the screenshot artifact from the"
          echo "   'Artifacts' section below and read the ID/Password manually."
          echo ""
          
          while true; do
            echo "[$(date)] Session active - Ctrl+C to terminate"
            sleep 3600
          done
