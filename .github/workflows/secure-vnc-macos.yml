name: macOS GUI (RustDesk Full Automation)
on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest
    steps:
      - name: Install Tailscale (optional)
        run: |
          brew install tailscale
          sudo tailscaled --tun=userspace-networking &
          sleep 5
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-macos-rustdesk || true
          for i in {1..5}; do
            IP=$(sudo tailscale ip -4 2>/dev/null || echo "unknown")
            if [ "$IP" != "unknown" ]; then
              echo "TAILSCALE_IP=$IP" >> $GITHUB_ENV
              break
            fi
            sleep 5
          done

      - name: Create user vncuser with password Apple@123
        run: |
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/bash
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID "510"
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "Apple@123"
          sudo dscl . -append /Groups/admin GroupMembership vncuser
          sudo createhomedir -c -u vncuser

      - name: Install dependencies
        run: |
          brew install tesseract cliclick

      - name: Download and Install RustDesk
        run: |
          curl -L -o /tmp/rustdesk.dmg "https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.dmg"
          hdiutil attach /tmp/rustdesk.dmg -nobrowse -mountpoint /Volumes/RustDesk
          cp -R "/Volumes/RustDesk/RustDesk.app" /Applications/
          hdiutil detach "/Volumes/RustDesk"

      - name: Reset Screen Recording permissions
        run: |
          sudo tccutil reset ScreenCapture

      - name: Launch RustDesk
        run: |
          sudo -u vncuser open /Applications/RustDesk.app
          sleep 15

      # ----- FULL 199-LINE APPLESCRIPT INLINED (no fetch, no file, real-time logs) -----
      - name: Run Screen Recording grant script (FULL INLINE)
        timeout-minutes: 8
        run: |
          echo "=== STARTING INLINE APPLESCRIPT ==="
          sudo -u vncuser osascript > /tmp/script_stdout.log 2> /tmp/script_stderr.log <<'APPLESCRIPT'
-- grant_screen_recording.applescript
-- Automates granting Screen Recording permission to RustDesk on macOS

-- Configuration
property passwordStr : "Apple@123"
property timeoutSec : 30
property shortDelay : 1
property mediumDelay : 2
property longDelay : 5

-- Helper: wait for a window
on waitForWindow(processName, windowText, maxWait)
    set startTime to current date
    repeat while (current date) - startTime < maxWait
        tell application "System Events"
            if exists (process processName) then
                tell process processName
                    if exists (first window whose title contains windowText) then return true
                end tell
            end if
        end tell
        delay 0.5
    end repeat
    return false
end waitForWindow

-- Helper: click button
on clickButton(processName, windowTitle, buttonTitle, maxWait)
    set startTime to current date
    repeat while (current date) - startTime < maxWait
        tell application "System Events"
            if processName is not "" and not (exists process processName) then
                delay 0.5
            else
                tell process processName
                    if exists (first window whose title contains windowTitle) then
                        set targetWindow to first window whose title contains windowTitle
                        if exists (first button of targetWindow whose title contains buttonTitle) then
                            click (first button of targetWindow whose title contains buttonTitle)
                            return true
                        end if
                    end if
                end tell
            end if
        end tell
        delay 0.5
    end repeat
    return false
end clickButton

-- Main routine
on run
    try
        log "=== STEP 1: Waiting for RustDesk window ==="
        if not waitForWindow("RustDesk", "RustDesk", timeoutSec) then
            error "RustDesk main window not found"
        end if
        
        tell application "System Events"
            tell process "RustDesk"
                set frontmost to true
                delay shortDelay
                if exists (first button whose title is "Configure") then
                    click (first button whose title is "Configure")
                    log "Clicked Configure button"
                else
                    do shell script "sudo -u vncuser cliclick c:200,300"
                    log "Fallback cliclick Configure"
                end if
            end tell
        end tell
        
        delay longDelay
        log "=== STEP 2: Waiting for Screen Recording dialog ==="
        if clickButton("System Events", "Screen Recording", "Open System Settings", timeoutSec) then
            log "Clicked Open System Settings"
        else
            do shell script "sudo -u vncuser cliclick c:512,384"
            delay mediumDelay
        end if
        
        delay longDelay
        log "=== STEP 3: Opening System Settings ==="
        if not waitForWindow("System Settings", "Screen Recording", timeoutSec) then
            do shell script "open 'x-apple.systempreferences:com.apple.preference.security?Privacy_ScreenRecording'"
            delay longDelay
        end if
        
        tell application "System Events"
            tell process "System Settings"
                set frontmost to true
                delay mediumDelay
                
                try
                    set lockButton to first button whose description contains "lock"
                    if exists lockButton then
                        click lockButton
                        delay mediumDelay
                        keystroke passwordStr
                        delay shortDelay
                        keystroke return
                        delay longDelay
                        log "Unlocked settings"
                    end if
                end try
                
                log "=== STEP 5: Enabling RustDesk switch ==="
                set found to false
                try
                    set mainTable to table 1 of scroll area 1 of window 1
                    repeat with aRow in (every row of mainTable)
                        try
                            if value of static text 1 of aRow is "RustDesk" then
                                click checkbox 1 of aRow
                                set found to true
                                log "Enabled RustDesk switch"
                                exit repeat
                            end if
                        end try
                    end repeat
                on error errMsg
                    log "Table error: " & errMsg
                end try
                
                if not found then
                    do shell script "sudo -u vncuser cliclick c:700,300"
                    log "Fallback cliclick switch"
                end if
            end tell
        end tell
        
        delay longDelay
        log "=== STEP 6-8: Password + Quit + Restart ==="
        tell application "System Events"
            set pwDialogFound to false
            repeat with proc in {"System Settings", "SecurityAgent"}
                if exists (process proc) then
                    tell process proc
                        if exists (first window whose title contains "Privacy & Security") then
                            set frontmost to true
                            keystroke passwordStr
                            delay shortDelay
                            try
                                click (first button whose title is "Modify Settings")
                            on error
                                keystroke return
                            end try
                            set pwDialogFound to true
                            log "Password confirmed"
                            exit repeat
                        end if
                    end tell
                end if
            end repeat
        end tell
        
        if clickButton("RustDesk", "RustDesk", "Quit", 15) then
            log "Clicked Quit"
        end if
        
        delay longDelay * 2
        log "=== STEP 8: Waiting for RustDesk restart ==="
        if waitForWindow("RustDesk", "RustDesk", timeoutSec) then
            tell application "System Events" to tell process "RustDesk" to set frontmost to true
            log "RustDesk restarted"
        else
            error "RustDesk did not restart"
        end if
        
        delay mediumDelay
        do shell script "sudo -u vncuser screencapture -x /tmp/rustdesk_screen_final.png"
        log "Screenshot taken"
        
        return "SUCCESS: Screen Recording permission granted"
        
    on error errMsg
        log "ERROR: " & errMsg
        return "FAILED: " & errMsg
    end try
end run
APPLESCRIPT

          echo "=== APPLESCRIPT FINISHED ==="
          echo "--- STDOUT (logs from script) ---"
          cat /tmp/script_stdout.log
          echo "--- STDERR ---"
          cat /tmp/script_stderr.log