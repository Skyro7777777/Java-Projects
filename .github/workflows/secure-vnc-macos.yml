name: macOS GUI RustDesk (FULL + ALL SCREENSHOTS)

on: workflow_dispatch

jobs:
  gui:
    runs-on: macos-latest

    steps:

    # -----------------------------
    # Create debug dir
    # -----------------------------
    - name: Prepare debug folder
      run: |
        mkdir -p /tmp/debug_screenshots


    # -----------------------------
    # Create GUI user
    # -----------------------------
    - name: Create user
      run: |
        sudo dscl . -create /Users/vncuser
        sudo dscl . -create /Users/vncuser UserShell /bin/bash
        sudo dscl . -create /Users/vncuser RealName "VNC User"
        sudo dscl . -create /Users/vncuser UniqueID 510
        sudo dscl . -create /Users/vncuser PrimaryGroupID 20
        sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
        sudo dscl . -passwd /Users/vncuser Apple@123
        sudo dscl . -append /Groups/admin GroupMembership vncuser
        sudo createhomedir -c -u vncuser

    # -----------------------------
    # Install tools
    # -----------------------------
    - name: Install deps
      run: |
        brew install tesseract cliclick
        which tesseract
        which cliclick


    # -----------------------------
    # Install RustDesk
    # -----------------------------
    - name: Install RustDesk
      run: |
        curl -L -o /tmp/rustdesk.dmg https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.dmg
        hdiutil attach /tmp/rustdesk.dmg -mountpoint /Volumes/RustDesk
        cp -R /Volumes/RustDesk/RustDesk.app /Applications/
        hdiutil detach /Volumes/RustDesk


    # -----------------------------
    # Launch RustDesk
    # -----------------------------
    - name: Launch RustDesk
      run: |
        sudo -u vncuser open /Applications/RustDesk.app
        sleep 10
        screencapture -x /tmp/debug_screenshots/01_rustdesk_launch.png


    # -----------------------------
    # Write automation script
    # -----------------------------
    - name: Write automation script
      run: |
        cat << 'PY' > /tmp/grant.py
        import subprocess, time, os, re, pathlib

        DEBUG = pathlib.Path("/tmp/debug_screenshots")
        DEBUG.mkdir(exist_ok=True)

        def shot(name):
            p = DEBUG / name
            subprocess.run(f"screencapture -x {p}", shell=True)

        def applescript(s):
            subprocess.run(["osascript","-e",s])

        def click_all():
            script = '''
            tell application "System Events"
              repeat with p in (every process)
                try
                  repeat with w in (every window of p)
                    try
                      repeat with b in {"Allow","Open System Settings","Open System Preferences"}
                        try
                          if exists button b of w then
                            click button b of w
                          end if
                        end try
                      end repeat
                    end try
                  end repeat
                end try
              end repeat
            end tell
            '''
            applescript(script)

        shot("02_start.png")

        # try clear dialogs
        for i in range(10):
            click_all()
            shot(f"03_clear_{i}.png")
            time.sleep(1)

        # open system settings
        applescript('tell application "System Settings" to activate')
        time.sleep(3)
        shot("04_settings.png")

        # search rustdesk
        applescript('tell application "System Events" to keystroke "RustDesk"')
        time.sleep(2)
        shot("05_search.png")

        # click some coords fallback
        for x,y in [(1000,400),(1100,450),(1200,500)]:
            subprocess.run(f"cliclick c:{x},{y}", shell=True)
            time.sleep(1)
            shot(f"06_click_{x}_{y}.png")

        shot("07_end.png")
        PY


    # -----------------------------
    # Run automation
    # -----------------------------
    - name: Run automation
      continue-on-error: true
      run: |
        sudo -u vncuser python3 /tmp/grant.py


    # -----------------------------
    # Screenshot rustdesk
    # -----------------------------
    - name: Capture screen
      run: |
        screencapture -x /tmp/debug_screenshots/08_final.png


    # -----------------------------
    # OCR RustDesk ID
    # -----------------------------
    - name: OCR
      run: |
        screencapture -x /tmp/rustdesk.png
        tesseract /tmp/rustdesk.png /tmp/out || true
        echo "TEXT:"
        cat /tmp/out.txt || true


    # -----------------------------
    # Upload ALL screenshots
    # -----------------------------
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      with:
        name: all-screenshots
        path: /tmp/debug_screenshots/


    # -----------------------------
    # Upload final screen
    # -----------------------------
    - name: Upload final
      uses: actions/upload-artifact@v4
      with:
        name: final-screen
        path: /tmp/rustdesk.png


    # -----------------------------
    # Keep alive
    # -----------------------------
    - name: Keep alive
      run: |
        echo READY
        while true; do sleep 3600; done